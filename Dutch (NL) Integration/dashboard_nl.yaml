  - type: sections
    max_columns: 4
    title: Configuratie
    path: configuratie
    icon: mdi:cog
    sections:
      - type: grid
        cards:
          - type: heading
            icon: ''
            heading: Gekoppelde Zendure
            heading_style: title
          - type: markdown
            text_only: true
            content: >-
              {% set product = states('sensor.zendure_2400_ac_productserie') %}
              {% set last =
              states('input_datetime.zendure_gielz_automatisering_laatste_keer_uitgevoerd')
              %}

              {% set base =
                'https://cdn.jsdelivr.net/gh/Gielz1986/Zendure-HA-zenSDK@main/Devices/' %}

              {% if last in ['unknown', 'unavailable', '', None] %}
                <img src="{{ base }}Inactive.png" width="100">
              {% else %}
                {% set diff = as_timestamp(now()) - as_timestamp(last) %}

                {% if diff >= 120 %}
                  <img src="{{ base }}Inactive.png" width="100">
                {% else %}

                  {% if product == 'solarFlow2400AC' %}
                    <img src="{{ base }}sf_2400_ac.png" width="100">
                  {% elif product == 'solarFlow2400AC+' %}
                    <img src="{{ base }}sf_2400_ac_plus.png" width="100">
                  {% elif product == 'Hyper2000' %}
                    <img src="{{ base }}hyper_2000.png" width="100">
                  {% elif product == 'solarFlow2400Pro' %}
                    <img src="{{ base }}sf_2400_pro.png" width="100">
                  {% elif product == 'solarFlow1600AC+' %}
                    <img src="{{ base }}sf_1600_ac_plus.png" width="100">
                  {% elif product == 'solarFlow800Pro' %}
                    <img src="{{ base }}sf_800_pro.png" width="100">
                  {% elif product == 'solarFlow800Plus' %}
                    <img src="{{ base }}sf_800_plus.png" width="100">
                  {% else %}
                    <img src="{{ base }}sf_2400_ac.png" width="100">
                  {% endif %}

                {% endif %}
              {% endif %}
            grid_options:
              columns: 3
              rows: auto
          - type: markdown
            content: >-
              {% set product = states('sensor.zendure_2400_ac_productserie') %}
              {% if product == 'solarFlow2400AC' %} **Solarflow 2400 AC** {%
              elif product == 'solarFlow2400AC+' %} **Solarflow 2400 AC+** {%
              elif product == 'solarFlow2400Pro' %} **Solarflow 2400 Pro** {%
              elif product == 'solarFlow1600AC+' %} **Solarflow 1600 AC+** {%
              elif product == 'Hyper2000' %} **Hyper 2000** {% elif product ==
              'solarFlow800Pro' %} **Solarflow 800 Pro** {% elif product ==
              'solarFlow800Plus' %} **Solarflow 800 Plus** {% else %}
              **Onbekend** {% endif %}({{
              states('sensor.zendure_2400_ac_totale_capaciteit') }} kWh)

              {{ states('sensor.zendure_2400_ac_serienummer') }}


              {% set last =
              states('input_datetime.zendure_gielz_automatisering_laatste_keer_uitgevoerd')
              %}

              {% if last not in ['unknown', 'unavailable', ''] %}
                {% set diff = as_timestamp(now()) - as_timestamp(last) %}

                **Automatisering Hartslag**  
                {% if diff > 120 %}Automatisering Offline
                {% else %} {{ as_timestamp(last) | timestamp_custom('%Y-%m-%d %H:%M') }} (laatste controle)
                {% endif %}

              {% else %}
                **Verkeerde entiteiten controleer package**
              {% endif %}
            grid_options:
              columns: 9
              rows: auto
          - type: heading
            icon: ''
            heading: Configuratie (Basis)
            heading_style: title
            badges: []
          - type: markdown
            content: >-
              <ha-alert alert-type="info">Helptekst</ha-alert>Vul hier het
              IP-adres van je Zendure in onder **Zendure 2400 AC IP-adres⚙️** en
              van je HomeWizard P1 (lokale API moet aanstaan) onder **Homewizard
              P1 IP-adres⚙️**. Gebruik je een afwijkende P1-sensor, dan kun je
              deze instellen via **Afwijkende P1 Sensor⚙️**.


              Hier stel je ook de **Standby Vertraging⚙️** in. Wanneer de
              Zendure geen actieve taak heeft, gaat hij na de ingestelde periode
              volledig in standby. Het verbruik bedraagt dan ongeveer 0,2 kWh
              per dag.


              Wil je niet te veel gedoe neem dan in eerste instantie de **Advies
              Instellingen⚙️** voor het gedrag in één keer over. Pas het daarna
              na eigen smaak aan.
            text_only: true
            visibility:
              - condition: state
                entity: input_boolean.help_tonen_op_dashboard
                state: 'on'
          - type: entities
            entities:
              - entity: input_text.zendure_2400_ac_ip_adres
              - entity: input_text.homewizard_p1_ip_adres
              - entity: input_number.zendure_2400_ac_standby_vertraging
                name: Standby Vertraging
              - entity: input_button.zendure_2400_ac_advies_instellingen_overnemen
                name: Advies Instellingen Overnemen
          - type: heading
            icon: ''
            heading: Configuratie (Opladen)
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.zendure_2400_ac_omvormer_max_oplaadvermogen
                icon: mdi:api
                color: '#01a180'
                tap_action:
                  action: more-info
          - type: markdown
            content: >-
              <ha-alert alert-type="info">Helptekst</ha-alert>Stel hier het
              maximaal oplaadvermogen van je Zendure in en maak de keuze wanneer
              jij wilt dat hij tijdens de **Nul op de meter** modus gaat starten
              met opladen en hoeveel marge hij moet houden tussen terugleveren
              en nul op de meter.
            text_only: true
            visibility:
              - condition: state
                entity: input_boolean.help_tonen_op_dashboard
                state: 'on'
          - type: entities
            entities:
              - entity: input_number.zendure_2400_ac_max_oplaadvermogen
                name: Max. Oplaadvermogen
              - entity: input_number.zendure_2400_ac_opladen_starten_bij
                name: Opladen Starten Bij
              - entity: input_number.zendure_2400_ac_oplaadmarge
                name: Oplaadmarge
          - type: heading
            icon: ''
            heading: Configuratie (Ontladen)
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.zendure_2400_ac_omvormer_max_ontlaadvermogen
                color: '#01a180'
                icon: mdi:api
                tap_action:
                  action: more-info
          - type: markdown
            content: >-
              <ha-alert alert-type="info">Helptekst</ha-alert>Stel hier het
              maximaal ontlaadvermogen van je Zendure in en maak de keuze
              wanneer jij wilt dat hij tijdens de **Nul op de meter** modus gaat
              starten met ontladen en hoeveel extra hij moet ontladen dan nul op
              de meter.
            text_only: true
            visibility:
              - condition: state
                entity: input_boolean.help_tonen_op_dashboard
                state: 'on'
          - type: entities
            entities:
              - entity: input_number.zendure_2400_ac_max_ontlaadvermogen
                name: Max. Ontlaadvermogen
              - entity: input_number.zendure_2400_ac_ontladen_starten_bij
                name: Ontladen Starten Bij
              - entity: input_number.zendure_2400_ac_ontlaadmarge
                name: Ontlaadmarge
      - type: grid
        cards:
          - type: heading
            icon: ''
            heading_style: title
            heading: Configuratie (Laadpercentage)
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.zendure_2400_ac_minimale_laadpercentage
                icon: mdi:api
                color: '#01a180'
                tap_action:
                  action: more-info
              - type: entity
                show_state: true
                show_icon: false
                entity: sensor.zendure_2400_ac_maximale_laadpercentage
                icon: mdi:api
                color: '#01a180'
                tap_action:
                  action: more-info
          - type: entities
            entities:
              - entity: input_boolean.zendure_2400_ac_soc_bescherming_uitgeschakeld
                name: SOC Bescherming Uitgeschakeld
              - entity: >-
                  input_number.zendure_2400_ac_minimaal_toegestaan_laadpercentage
                name: Min. Laadpercentage
              - entity: >-
                  input_number.zendure_2400_ac_maximaal_toegestaan_laadpercentage
                name: Max. Laadpercentage
          - type: heading
            icon: ''
            heading: Configuratie (Optioneel)
            heading_style: title
          - type: markdown
            content: >-
              <ha-alert alert-type="info">Helptekst</ha-alert>Maak je geen
              gebruik van een Homewizard P1 maar heb je wel een P1/CT sensor
              waarbij -watt teruglevering is en +watt import per seconden is vul
              deze dan hier in onder **Afwijkende P1 Sensor⚙️**.


              Ook kun je hier een afwijkende batterij volgorde instellen onder
              **Batterij Volgorde⚙️**. Hiermee bepaal je zelf een afwijkende
              volgorde van de batterijen. De juiste volgorde bepaal je mede aan
              de hand van **sensor.zendure_2400_ac_batterij_serienummers** en de
              sticker op de batterij(en). Op deze manier zullen de
              batterijtemperaturen en het laadpercentage de juiste volgorde
              hanteren zoals die van de batterij(en) in de stapel.
            text_only: true
            visibility:
              - condition: state
                entity: input_boolean.help_tonen_op_dashboard
                state: 'on'
          - type: entities
            entities:
              - entity: input_text.afwijkende_p1_sensor
              - entity: input_text.zendure_2400_ac_batterij_volgorde
                name: Batterij Volgorde
          - type: heading
            icon: ''
            heading: Configuratie (Dynamisch)
            heading_style: title
            badges: []
          - type: markdown
            content: >-
              <ha-alert alert-type="info">Helptekst</ha-alert>Heb je een
              dynamisch contract dan kun je hier de Nordpool HACS sensor
              invullen en aangeven wat de minimale spread moet zijn om gebruik
              te maken van het laden en ontladen op lage en hoge tarieven.


              Heb je een 15 minuten contract vink dit dan aan zodat de grafieken
              en de prijzen goed gezet worden.
            text_only: true
            visibility:
              - condition: state
                entity: input_boolean.help_tonen_op_dashboard
                state: 'on'
          - type: entities
            entities:
              - entity: input_text.dynamisch_nordpool_sensor
              - entity: input_number.dynamisch_minimale_spread
                name: Minimale Spread
              - entity: input_boolean.dynamisch_15_minuten
                name: 15 Minuten Tarieven Actief
          - type: heading
            icon: ''
            heading_style: title
            heading: Configuratie (Dashboard)
          - type: markdown
            content: >-
              <ha-alert alert-type="info">Helptekst</ha-alert>Hier stel je in of
              je de Dynamische informatie wilt verbergen of tonen op het eerste
              tabblad via **Dynamisch Tonen Op Dashboard⚙️**.
            text_only: true
            visibility:
              - condition: state
                entity: input_boolean.help_tonen_op_dashboard
                state: 'on'
          - type: entities
            entities:
              - entity: input_boolean.help_tonen_op_dashboard
              - entity: input_boolean.pv_tonen_op_dashboard
              - entity: input_boolean.dynamisch_tonen_op_dashboard
      - type: grid
        cards:
          - type: heading
            heading: Logboek (afgelopen 4 uur)
            heading_style: title
            badges:
              - type: button
                icon: mdi:information
                tap_action:
                  action: navigate
                  navigation_path: /logbook
                color: '#01a180'
                text: Meer
          - type: logbook
            target:
              entity_id:
                - input_select.zendure_2400_ac_modus_selecteren
            grid_options:
              columns: 12
              rows: 12
            hours_to_show: 4
          - type: heading
            icon: ''
            heading: Versiebeheer
            heading_style: title
            badges:
              - type: button
                icon: mdi:information
                text: Toon laatste releasenotes
                color: '#01a180'
                tap_action:
                  action: navigate
                  navigation_path: releasenotes
            visibility:
              - condition: state
                entity: sensor.zendure_ha_zensdk_github_releasecheck
                state_not: Pre-release actief
          - type: heading
            icon: ''
            heading: Versiebeheer
            heading_style: title
            badges:
              - type: button
                icon: mdi:information
                text: Toon pre-releasenotes
                color: '#01a180'
                tap_action:
                  action: url
                  url_path: https://github.com/Gielz1986/Zendure-HA-zenSDK/pulls
            visibility:
              - condition: state
                entity: sensor.zendure_ha_zensdk_github_releasecheck
                state: Pre-release actief
          - type: markdown
            content: >-
              <ha-alert alert-type="info">Helptekst</ha-alert>Hier kun je zien
              welke package versie je gebruikt en wat de nieuwste versie is op
              GitHub. Ook zie je meteen hoeveel problemen er openstaan en kun je
              hier op doorklikken naar GitHub.
            text_only: true
            visibility:
              - condition: state
                entity: input_boolean.help_tonen_op_dashboard
                state: 'on'
          - type: entities
            entities:
              - entity: sensor.zendure_2400_ac_configuratie_versie
                name: Versie in gebruik
              - entity: sensor.github_zendure_ha_zensdk_gielz1986
                name: Versie op GitHub
              - entity: sensor.zendure_ha_zensdk_github_releasecheck
                name: Releasecheck
          - type: markdown
            content: >
              &nbsp;&nbsp;[![Open
              Issues](https://img.shields.io/github/issues/Gielz1986/Zendure-HA-zenSDK?style=for-the-badge&label=Openstaande%20Problemen&labelColor=029c7b&color=0d2e2b)](https://github.com/Gielz1986/Zendure-HA-zenSDK/issues)
            grid_options:
              columns: 12
              rows: auto
            text_only: true
    cards: []
    dense_section_placement: false
  - type: sections
    max_columns: 2
    subview: true
    path: releasenotes
    title: Releasenotes
    icon: mdi:github
    sections:
      - type: grid
        cards:
          - type: markdown
            content: >
              **{{ state_attr('sensor.github_zendure_ha_zensdk_gielz1986',
              'tag_name')}}**

              {{ state_attr('sensor.github_zendure_ha_zensdk_gielz1986',
              'body')}}
            grid_options:
              columns: 24
              rows: auto
            text_only: true
        column_span: 2
    cards: []
