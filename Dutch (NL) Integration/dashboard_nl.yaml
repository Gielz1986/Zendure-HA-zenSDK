              xaxis:
                labels:
                  show: false
                  style:
                    colors: grey
                axisTicks:
                  show: false
                axisBorder:
                  color: color-mix(in srgb, var(--divider-color) 50%, transparent)
              yaxis:
                - title:
                    text: ''
                  decimalsInFloat: 0
                  labels:
                    style:
                      colors: >-
                        color-mix(in srgb, var(--primary-text-color) 75%,
                        transparent)
              grid:
                strokeDashArray: 0
                borderColor: color-mix(in srgb, var(--divider-color) 50%, transparent)
                show: true
                padding:
                  top: -10
              chart:
                height: 150px
              legend:
                show: true
                floating: true
                horizontalAlign: left
                offsetX: 25
                offsetY: 17
                formatter: |
                  EVAL:function(seriesName, opts) {
                    // filter series die niet in de legenda moeten
                    if(seriesName === "Leeg" || seriesName === "P1 (NOM Doel) (-5s)") return "";
                    return seriesName;
                  }
              markers:
                size: 0
                hover:
                  size: 0
          - type: heading
            icon: ''
            heading: PV
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                color: var(--accent-color)
                entity: sensor.zendure_2400_ac_pv_doorvoer
                tap_action:
                  action: more-info
              - type: entity
                show_state: true
                show_icon: true
                color: var(--accent-color)
                entity: sensor.zendure_2400_ac_vermogen_pv_naar_batterij
                icon: mdi:battery
                visibility:
                  - condition: numeric_state
                    entity: sensor.zendure_2400_ac_vermogen_pv_naar_batterij
                    above: 0
                tap_action:
                  action: more-info
              - type: entity
                show_state: true
                show_icon: true
                color: var(--accent-color)
                entity: sensor.zendure_2400_ac_vermogen_pv_naar_huis
                icon: mdi:home
                visibility:
                  - condition: numeric_state
                    entity: sensor.zendure_2400_ac_vermogen_pv_naar_huis
                    above: 0
                tap_action:
                  action: more-info
              - type: entity
                show_state: true
                show_icon: true
                color: var(--accent-color)
                entity: sensor.zendure_2400_ac_pv_import_dagelijks
                tap_action:
                  action: more-info
            visibility:
              - condition: state
                entity: input_boolean.pv_tonen_op_dashboard
                state: 'on'
          - type: custom:apexcharts-card
            experimental:
              hidden_by_default: true
              color_threshold: true
              brush: false
            brush:
              selection_span: 1d
              apex_config:
                grid:
                  strokeDashArray: 0
                  borderColor: color-mix(in srgb, var(--divider-color) 50%, transparent)
                  show: true
                yaxis:
                  show: false
                xaxis:
                  labels:
                    show: false
                  axisTicks:
                    show: false
                  axisBorder:
                    color: color-mix(in srgb, var(--divider-color) 50%, transparent)
                chart:
                  height: 100
            cache: true
            update_interval: 15min
            stacked: true
            header:
              show: true
              show_states: true
              title: ''
            graph_span: 1d
            span:
              start: day
            series:
              - entity: sensor.zendure_2400_ac_vermogen_pv_totaal
                name: Totaal
                statistics:
                  period: 5minute
                  type: mean
                  align: start
                type: area
                stroke_width: 2
                opacity: 0.35
                extend_to: now
                color: var(--accent-color)
                float_precision: 0
                yaxis_id: energy
                show:
                  in_brush: true
                  in_header: false
                  in_legend: true
                color_threshold:
                  - value: 0
                    opacity: 0.1
                  - value: 100
                    opacity: 0.15
                  - value: 200
                    opacity: 0.25
                  - value: 300
                    opacity: 0.3
                  - value: 400
                    opacity: 0.35
                  - value: 500
                    opacity: 0.4
                  - value: 600
                    opacity: 0.45
                  - value: 700
                    opacity: 0.5
              - entity: sensor.zendure_2400_ac_vermogen_pv_naar_batterij
                name: Naar Batterij
                statistics:
                  period: 5minute
                  type: mean
                  align: start
                type: area
                opacity: 0
                stroke_width: 0
                extend_to: now
                color: '#01a180'
                float_precision: 0
                yaxis_id: energy
                show:
                  in_brush: true
                  in_header: false
                  in_legend: false
              - entity: sensor.zendure_2400_ac_vermogen_pv_naar_huis
                name: Naar Huis
                statistics:
                  period: 5minute
                  type: mean
                  align: start
                type: area
                opacity: 0.35
                stroke_width: 0
                extend_to: now
                color: '#c0c0c2'
                float_precision: 0
                yaxis_id: energy
                show:
                  in_brush: true
                  in_header: false
                  in_legend: false
            apex_config:
              tooltip:
                x:
                  format: HH:mm
                  show: false
              xaxis:
                labels:
                  show: false
                  style:
                    colors: grey
                axisTicks:
                  show: false
                axisBorder:
                  color: color-mix(in srgb, var(--divider-color) 50%, transparent)
              yaxis:
                - min: 0
                  title:
                    text: ''
                  decimalsInFloat: 0
                  labels:
                    style:
                      colors: >-
                        color-mix(in srgb, var(--primary-text-color) 75%,
                        transparent)
              grid:
                strokeDashArray: 0
                borderColor: color-mix(in srgb, var(--divider-color) 50%, transparent)
                show: true
              chart:
                height: 150px
              legend:
                show: true
                floating: true
                horizontalAlign: left
                offsetX: 25
                offsetY: 17
                formatter: |
                  EVAL:function(seriesName, opts) {
                    // filter series die niet in de legenda moeten
                    if(seriesName === "Naar Batterij" || seriesName === "Naar Huis") return "";
                    return seriesName;
                  }
              markers:
                size: 0
                hover:
                  size: 0
            visibility:
              - condition: state
                entity: input_boolean.pv_tonen_op_dashboard
