      - type: grid
        cards:
          - type: heading
            icon: ''
            heading_style: title
            heading: Aansturing
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.p1_aansturing_vermogen
                name: P1
                state_content:
                  - name
                  - state
                color: '#01a180'
                icon: mdi:home
                tap_action:
                  action: more-info
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.zendure_2400_ac_soc_limiet_status
                name: SOC-limiet Status
              - entity: sensor.zendure_2400_ac_indicatie_beschikbare_energie
                name: Beschikbare Energie
                secondary_info: none
              - entity: sensor.zendure_2400_ac_resterende_ontlaad_tijd
                name: Resterende Ontlaad Tijd
              - entity: sensor.zendure_2400_ac_modus
                name: Modus
                secondary_info: none
              - entity: sensor.zendure_2400_ac_ingesteld_ontlaadvermogen
                name: Ingesteld Ontlaadvermogen
                icon: ''
              - entity: sensor.zendure_2400_ac_ingesteld_oplaadvermogen
                name: Ingesteld Oplaadvermogen
          - type: heading
            icon: ''
            heading: Nul Import
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.p1_nul_import_duur_vandaag
                color: '#01a180'
                icon: mdi:leaf
                tap_action:
                  action: more-info
                name: Vandaag
                state_content:
                  - name
                  - state
          - type: markdown
            content: >-
              <ha-alert alert-type="info">Helptekst</ha-alert>Hier zie je het
              aantal nul-importuren per dag van deze maand en de vorige maand.
              Dit overzicht laat zien hoe goed je dagen zijn verlopen met
              betrekking tot het niet importeren van stroom. Elke seconde dat
              het P1-vermogen op 0 of lager staat, wordt meegeteld in het
              totaal.


              Deze gegevens komen uit de statistics (LTS). Hierdoor loopt de
              grafiek gemiddeld 1 uur achter.
            text_only: true
            visibility:
              - condition: state
                entity: input_boolean.help_tonen_op_dashboard
                state: 'on'
          - type: custom:apexcharts-card
            experimental:
              hidden_by_default: true
            header:
              show: true
              title: ''
            graph_span: 2month
            span:
              start: month
              offset: '-1month'
            cache: false
            apex_config:
              yaxis:
                - decimalsInFloat: 0
                  tickAmount: 4
                  min: 0
                  max: 24
                  labels:
                    show: true
                    style:
                      colors: >-
                        color-mix(in srgb, var(--primary-text-color) 75%,
                        transparent)
              tooltip:
                x:
                  format: d/MM
                  show: false
                'y':
                  formatter: |
                    EVAL:function(value) {
                      const h = Math.floor(value);
                      const m = Math.round((value - h) * 60);
                      return h + "u " + m + "m";
                    }
              grid:
                show: true
                borderColor: color-mix(in srgb, var(--divider-color) 50%, transparent)
                strokeDashArray: 0
                padding:
                  top: -10
                row:
                  opacity: 0.5
              chart:
                height: 150px
              legend:
                show: false
                floating: true
                horizontalAlign: left
                offsetX: 0
                offsetY: 17
              xaxis:
                labels:
                  show: false
                axisTicks:
                  show: false
                axisBorder:
                  color: color-mix(in srgb, var(--divider-color) 50%, transparent)
            series:
              - entity: sensor.p1_nul_import_duur_vandaag
                name: Nul import
                statistics:
                  period: day
                  type: max
                  align: start
                type: column
                color: '#01a180'
                show:
                  in_header: false
                  in_legend: false
          - type: heading
            icon: ''
            heading_style: title
            heading: Import | Export
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.zendure_2400_ac_rte_totaal
                name: RTE
                state_content:
