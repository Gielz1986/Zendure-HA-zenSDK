                formatter: |
                  EVAL:function(seriesName, opts) {
                    // filter series die niet in de legenda moeten
                    if(seriesName === "Laadpercentage" || seriesName === "P1 (NOM Doel)") return "";
                    return seriesName;
                  }
              markers:
                size: 0
                hover:
                  size: 0
            visibility:
              - condition: state
                entity: input_select.zendure_2400_ac_modus_selecteren
                state: Handmatig
          - type: custom:apexcharts-card
            experimental:
              hidden_by_default: true
              color_threshold: true
            cache: false
            stacked: true
            update_interval: 5sec
            header:
              show: true
              show_states: true
              title: ''
            graph_span: 10min
            series:
              - entity: sensor.zendure_2400_ac_vermogen_aansturing
                name: Batterij
                group_by:
                  func: avg
                  duration: 5sec
                type: area
                transform: return -x;
                offset: '-5s'
                stroke_width: 2
                opacity: 0.35
                extend_to: now
                color: '#01a180'
                float_precision: 0
                color_threshold:
                  - value: -2000
                    opacity: 0.5
                  - value: -1750
                    opacity: 0.45
                  - value: -1500
                    opacity: 0.4
                  - value: -1250
                    opacity: 0.35
                  - value: -1000
                    opacity: 0.3
                  - value: -750
                    opacity: 0.25
                  - value: -500
                    opacity: 0.15
                  - value: 0
                    opacity: 0.1
                  - value: 500
                    opacity: 0.15
                  - value: 750
                    opacity: 0.25
                  - value: 1000
                    opacity: 0.3
                  - value: 1250
                    opacity: 0.35
                  - value: 1500
                    opacity: 0.4
                  - value: 1750
                    opacity: 0.45
                  - value: 2000
                    opacity: 0.5
                yaxis_id: energy
                show:
                  in_header: false
                  in_legend: true
                  offset_in_name: false
              - entity: sensor.p1_nom_doel
                name: P1 (NOM Doel)
                offset: '-5s'
                group_by:
                  func: avg
                  duration: 5sec
                type: area
                stroke_width: 0
                opacity: 0.3
                extend_to: now
                color: '#c0c0c2'
                float_precision: 0
                yaxis_id: energy
                show:
                  in_header: false
                  in_legend: false
              - entity: input_number.zendure_2400_ac_ontladen_starten_bij
                name: Start ontladen
                type: line
                stroke_width: 2
                color: var(--accent-color)
                opacity: 1
                stroke_dash: 2
                curve: stepline
                extend_to: now
                float_precision: 0
                yaxis_id: energy
                show:
                  hidden_by_default: true
                  in_header: false
              - entity: input_number.zendure_2400_ac_opladen_starten_bij
                name: Start opladen
                type: line
                stroke_width: 2
                color: var(--accent-color)
                opacity: 1
                stroke_dash: 2
                curve: stepline
                extend_to: now
                float_precision: 0
                yaxis_id: energy
                show:
                  hidden_by_default: true
                  in_header: false
