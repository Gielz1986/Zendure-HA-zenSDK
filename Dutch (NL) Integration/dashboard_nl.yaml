views:
  - type: sections
    max_columns: 3
    title: Zendure
    path: zendure
    sections:
      - type: grid
        cards:
          - type: heading
            icon: ''
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.zendure_2400_ac_vermogen_aansturing
                tap_action:
                  action: more-info
                color: '#01a180'
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.zendure_2400_ac_vermogen_offgrid_stopcontact_1
                tap_action:
                  action: more-info
                color: '#01a180'
                visibility:
                  - condition: state
                    entity: sensor.zendure_2400_ac_offgrid_modus
                    state_not: Uitgeschakeld
                  - condition: numeric_state
                    entity: sensor.zendure_2400_ac_vermogen_offgrid_stopcontact_1
                    above: 0
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.zendure_2400_ac_laadpercentage
                color: '#01a180'
                tap_action:
                  action: more-info
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.zendure_2400_ac_relais_schakelingen_totaal_vandaag
                icon: mdi:swap-vertical-bold
                color: '#01a180'
                tap_action:
                  action: more-info
            heading: Batterij
          - type: markdown
            content: >-
              <ha-alert alert-type="info">Help text</ha-alert>Voor uitleg over
              de verschillende modussen, zie wiki:  

              [Modus Selecteren (GitHub
              Wiki)](https://github.com/Gielz1986/Zendure-HA-zenSDK/wiki/NL-%E2%80%90-Modussen)
            text_only: true
            visibility:
              - condition: state
                entity: input_boolean.help_tonen_op_dashboard
                state: 'on'
          - type: entities
            entities:
              - entity: input_select.zendure_2400_ac_modus_selecteren
                secondary_info: none
            show_header_toggle: false
            state_color: false
          - type: entities
            entities:
              - entity: input_number.zendure_2400_ac_handmatig_vermogen
                name: Vermogen
                secondary_info: last-changed
            visibility:
              - condition: state
                entity: input_select.zendure_2400_ac_modus_selecteren
                state: Handmatig
          - type: custom:apexcharts-card
            experimental:
              hidden_by_default: true
              color_threshold: true
              brush: false
            brush:
              selection_span: 1d
              apex_config:
                grid:
                  strokeDashArray: 0
                  borderColor: color-mix(in srgb, var(--divider-color) 50%, transparent)
                  show: true
                yaxis:
                  show: false
                xaxis:
                  labels:
                    show: false
                  axisTicks:
                    show: false
                  axisBorder:
                    color: color-mix(in srgb, var(--divider-color) 50%, transparent)
                chart:
                  height: 100
            cache: true
            update_interval: 15min
            stacked: true
            header:
              show: true
              show_states: true
              title: ''
            graph_span: 1d
            span:
              start: day
            series:
              - entity: sensor.zendure_2400_ac_vermogen_aansturing
                name: Batterij
                statistics:
                  period: 5minute
                  type: mean
                  align: start
                type: area
                transform: return -x;
                stroke_width: 2
                opacity: 0.35
                extend_to: now
                color: '#01a180'
                float_precision: 0
                color_threshold:
                  - value: -2000
                    opacity: 0.5
                  - value: -1750
                    opacity: 0.45
                  - value: -1500
                    opacity: 0.4
                  - value: -1250
                    opacity: 0.35
                  - value: -1000
                    opacity: 0.3
                  - value: -750
                    opacity: 0.25
                  - value: -500
                    opacity: 0.15
                  - value: 0
                    opacity: 0.1
                  - value: 500
                    opacity: 0.15
                  - value: 750
                    opacity: 0.25
                  - value: 1000
                    opacity: 0.3
                  - value: 1250
                    opacity: 0.35
                  - value: 1500
                    opacity: 0.4
                  - value: 1750
                    opacity: 0.45
                  - value: 2000
                    opacity: 0.5
                yaxis_id: energy
                show:
                  in_brush: true
                  in_header: false
                  in_legend: true
              - entity: sensor.p1_nom_doel
                name: P1 (NOM Doel)
                statistics:
                  period: 5minute
                  type: mean
                  align: start
                type: area
                stroke_width: 0
                opacity: 0.3
                extend_to: now
                color: '#c0c0c2'
                float_precision: 0
                yaxis_id: energy
                show:
                  in_brush: true
                  in_header: false
                  in_legend: false
              - entity: sensor.zendure_2400_ac_laadpercentage
                name: Laadpercentage
                statistics:
                  period: 5minute
                  type: max
                  align: start
                type: line
                curve: smooth
                stroke_width: 0
                opacity: 1
                extend_to: now
                color: var(--accent-color)
                float_precision: 0
                yaxis_id: percentage
                show:
                  in_header: false
                  in_legend: false
            apex_config:
              tooltip:
                x:
                  format: HH:mm
                  show: false
              xaxis:
                labels:
                  show: false
                  style:
                    colors: grey
                axisTicks:
                  show: false
                axisBorder:
                  color: color-mix(in srgb, var(--divider-color) 50%, transparent)
              yaxis:
                - title:
                    text: ''
                  decimalsInFloat: 0
                  labels:
                    style:
                      colors: >-
                        color-mix(in srgb, var(--primary-text-color) 75%,
                        transparent)
              grid:
                strokeDashArray: 0
                borderColor: color-mix(in srgb, var(--divider-color) 50%, transparent)
                show: true
              chart:
                height: 300px
                toolbar:
                  autoSelected: pan
                  show: true
                  tools:
                    download: false
                    zoom: true
                    zoomin: false
                    zoomout: false
                    pan: true
                zoom:
                  enabled: true
                  allowMouseWheelZoom: true
                  autoScaleYaxis: true
              legend:
                show: true
                floating: true
                horizontalAlign: left
                offsetX: 25
                offsetY: 17
                formatter: |
                  EVAL:function(seriesName, opts) {
                    // filter series die niet in de legenda moeten
                    if(seriesName === "Laadpercentage" || seriesName === "P1 (NOM Doel)") return "";
                    return seriesName;
                  }
              markers:
                size: 0
                hover:
                  size: 0
            visibility:
              - condition: state
                entity: input_select.zendure_2400_ac_modus_selecteren
                state_not: Handmatig
          - type: custom:apexcharts-card
            experimental:
              hidden_by_default: true
              color_threshold: true
              brush: false
            brush:
              selection_span: 1d
              apex_config:
                grid:
                  strokeDashArray: 0
                  borderColor: color-mix(in srgb, var(--divider-color) 50%, transparent)
                  show: true
                yaxis:
                  show: false
                xaxis:
                  labels:
                    show: false
                  axisTicks:
                    show: false
                  axisBorder:
                    color: color-mix(in srgb, var(--divider-color) 50%, transparent)
                chart:
                  height: 100
            cache: true
            update_interval: 15min
            stacked: true
            header:
              show: true
              show_states: true
              title: ''
            graph_span: 1d
            span:
              start: day
            series:
              - entity: sensor.zendure_2400_ac_vermogen_aansturing
                name: Batterij
                statistics:
                  period: 5minute
                  type: mean
                  align: start
                type: area
                transform: return -x;
                stroke_width: 2
                opacity: 0.35
                extend_to: now
                color: '#01a180'
                float_precision: 0
                color_threshold:
                  - value: -2000
                    opacity: 0.5
                  - value: -1750
                    opacity: 0.45
                  - value: -1500
                    opacity: 0.4
                  - value: -1250
                    opacity: 0.35
                  - value: -1000
                    opacity: 0.3
                  - value: -750
                    opacity: 0.25
                  - value: -500
                    opacity: 0.15
                  - value: 0
                    opacity: 0.1
                  - value: 500
                    opacity: 0.15
                  - value: 750
                    opacity: 0.25
                  - value: 1000
                    opacity: 0.3
                  - value: 1250
                    opacity: 0.35
                  - value: 1500
                    opacity: 0.4
                  - value: 1750
                    opacity: 0.45
                  - value: 2000
                    opacity: 0.5
                yaxis_id: energy
                show:
                  in_brush: true
                  in_header: false
                  in_legend: true
              - entity: sensor.p1_nom_doel
                name: P1 (NOM Doel)
                statistics:
                  period: 5minute
                  type: mean
                  align: start
                type: area
                stroke_width: 0
                opacity: 0.3
                extend_to: now
                color: '#c0c0c2'
                float_precision: 0
                yaxis_id: energy
                show:
                  in_brush: true
                  in_header: false
                  in_legend: false
              - entity: sensor.zendure_2400_ac_laadpercentage
                name: Laadpercentage
                statistics:
                  period: 5minute
                  type: max
                  align: start
                type: line
                curve: smooth
                stroke_width: 0
                opacity: 1
                extend_to: now
                color: var(--accent-color)
                float_precision: 0
                yaxis_id: percentage
                show:
                  in_header: false
                  in_legend: false
            apex_config:
              tooltip:
                x:
                  format: HH:mm
                  show: false
              xaxis:
                labels:
                  show: false
                  style:
                    colors: grey
                axisTicks:
                  show: false
                axisBorder:
                  color: color-mix(in srgb, var(--divider-color) 50%, transparent)
              yaxis:
                - title:
                    text: ''
                  decimalsInFloat: 0
                  labels:
