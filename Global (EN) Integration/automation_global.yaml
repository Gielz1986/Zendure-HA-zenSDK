            condition: template
            value_template: |2-
                    {{ states('sensor.zendure_total_state_of_charge') | float(0) < 
                       states('sensor.zendure_maximum_state_of_charge') | float(0) }}
          - alias: >-
              sensor.dynamic_spread_indication higher or equal as
              input_number.dynamic_setting_minimal_spread
            condition: template
            value_template: >-
              {{ states('sensor.dynamic_spread_indication') | float >=
              states('input_number.dynamic_setting_minimal_spread') | float }}
          - condition: state
            entity_id: input_boolean.dynamic_charging_running
            state:
              - "off"
        sequence:
          - action: input_boolean.turn_on
            data: {}
            target:
              entity_id:
                - input_boolean.dynamic_charging_running
          - action: rest_command.zendure_save_in_ram
            data:
              sn: "{{ states('sensor.zendure_serial_number') }}"
          - delay:
              hours: 0
              minutes: 0
              seconds: 5
              milliseconds: 0
          - action: rest_command.zendure_quick_charge
            data:
              sn: "{{ states('sensor.zendure_serial_number') }}"
              inputLimit: >-
                {{ states('input_number.zendure_setting_max_charge_power') | int
                }}
          - action: logbook.log
            data:
              message: 💲Dynamic cheap charging started —
              entity_id: input_select.zendure_operation_mode
              name: " "
          - wait_for_trigger:
              - entity_id: sensor.dynamic_lowest_price_period
                to: "No"
                trigger: state
              - trigger: template
                value_template: >
                  {{ states('sensor.zendure_total_state_of_charge') | float(0)
                  ==
                     states('sensor.zendure_maximum_state_of_charge') | float(0) }}
                alias: Maximale ingestelde SOC bereikt
              - trigger: state
                entity_id:
                  - input_select.zendure_operation_mode
              - trigger: state
                entity_id:
                  - input_number.dynamic_setting_minimal_spread
              - trigger: state
                entity_id:
                  - sensor.dynamic_spread_indication
            continue_on_timeout: false
          - action: rest_command.zendure_stop_with_everything
            data:
              sn: "{{ states('sensor.zendure_serial_number') }}"
          - action: input_boolean.turn_on
            data: {}
            target:
              entity_id: input_boolean.dynamic_recently_charged
          - action: input_boolean.turn_off
            target:
              entity_id:
                - input_boolean.dynamic_charging_running
            data: {}
          - action: logbook.log
            data:
              message: 💲Dynamic cheap charging complete  —
              entity_id: input_select.zendure_operation_mode
              name: " "
        alias: Dynamic cheap charging
      - conditions:
          - condition: trigger
            id:
              - aansturing_trigger
          - condition: template
            value_template: >-
              {{
              states('input_text.dynamic_setting_nordpool_sensor').lower().startswith('sensor')
              }}
            alias: input_text.dynamic_setting_nordpool_sensor is gevuld
          - condition: or
            conditions:
              - condition: state
                entity_id: input_select.zendure_operation_mode
                state:
                  - Dynamic Trading
              - condition: state
                entity_id: input_select.zendure_operation_mode
                state:
                  - Dynamic Trading + Smart Matching
          - condition: state
            entity_id: sensor.zendure_soc_limit_status
            state:
              - Normal Operation
              - Charging Limit Reached
              - unknown
          - alias: Up to the minimum configured SOC
            condition: template
            value_template: |
              {{ states('sensor.zendure_total_state_of_charge') | float >
               states('sensor.zendure_minimum_state_of_charge') | float }}
          - condition: state
            entity_id: sensor.dynamic_highest_price_period
            state:
              - "Yes"
          - alias: >-
              sensor.dynamic_spread_indication higher or equal as
              input_number.dynamic_setting_minimal_spread
            condition: template
            value_template: >-
              {{ states('sensor.dynamic_spread_indication') | float >=
              states('input_number.dynamic_setting_minimal_spread') | float }}
          - condition: state
            entity_id: input_boolean.dynamic_discharging_running
            state:
              - "off"
        sequence:
          - action: input_boolean.turn_on
            data: {}
            target:
              entity_id:
                - input_boolean.dynamic_discharging_running
          - action: rest_command.zendure_save_in_ram
            data:
              sn: "{{ states('sensor.zendure_serial_number') }}"
          - delay:
              hours: 0
              minutes: 0
              seconds: 5
              milliseconds: 0
          - action: rest_command.zendure_quick_discharge
            data:
              sn: "{{ states('sensor.zendure_serial_number') }}"
              outputLimit: >-
                {{ states('input_number.zendure_setting_max_discharge_power') |
                int }}
          - action: logbook.log
            data:
              message: 💲Dynamic expensive discharge started —
              entity_id: input_select.zendure_operation_mode
              name: " "
          - wait_for_trigger:
              - alias: Tot minimale SOC
                trigger: template
                value_template: |-
                  {{ states('sensor.zendure_total_state_of_charge') | float <=
                     states('sensor.zendure_minimum_state_of_charge') | float }}
              - entity_id:
                  - sensor.dynamic_highest_price_period
                to:
                  - "No"
                trigger: state
              - trigger: state
                entity_id:
                  - input_select.zendure_operation_mode
              - trigger: state
                entity_id:
                  - input_number.dynamic_setting_minimal_spread
              - trigger: state
                entity_id:
                  - sensor.dynamic_spread_indication
            continue_on_timeout: false
          - action: rest_command.zendure_stop_with_everything
            data:
              sn: "{{ states('sensor.zendure_serial_number') }}"
          - action: input_boolean.turn_off
            target:
              entity_id:
                - input_boolean.dynamic_discharging_running
            data: {}
          - action: logbook.log
            data:
              message: 💲Dynamic expensive discharge complete  —
              entity_id: input_select.zendure_operation_mode
              name: " "
        alias: Dynamic expensive discharging
mode: parallel
