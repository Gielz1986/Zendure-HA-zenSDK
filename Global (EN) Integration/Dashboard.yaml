              product == 'solarFlow1600AC+' %} **Solarflow 1600 AC+** {% elif
              product == 'solarFlow800Pro' %} **Solarflow 800 Pro** {% elif
              product == 'solarFlow800Plus' %} **Solarflow 800 Plus** {% else %}
              **Onbekend** {% endif %} ({{
              states('sensor.zendure_total_capacity') }} kWh)

              {{ states('sensor.zendure_serienumber') }}
