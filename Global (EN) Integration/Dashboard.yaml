            heading_style: title
            badges: []
          - type: markdown
            content: >-
              <ha-alert alert-type="info">Helptekst</ha-alert>Vul hier het
              IP-adres van je Zendure in onder **Zendure 2400 AC IP-adres⚙️** en
              van je HomeWizard P1 (lokale API moet aanstaan) onder **Homewizard
              P1 IP-adres⚙️**. Gebruik je een afwijkende P1-sensor, dan kun je
              deze instellen via **Afwijkende P1 Sensor⚙️**.


              Hier stel je ook de **Standby Vertraging⚙️** in. Wanneer de
              Zendure geen actieve taak heeft, gaat hij na de ingestelde periode
              volledig in standby. Het verbruik bedraagt dan ongeveer 0,2 kWh
              per dag.


              Wil je niet te veel gedoe neem dan in eerste instantie de **Advies
              Instellingen⚙️** voor het gedrag in één keer over. Pas het daarna
