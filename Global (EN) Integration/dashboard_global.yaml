                  action: more-info
              - type: entity
                show_state: true
                show_icon: false
                entity: sensor.zendure_maximum_state_of_charge
                icon: mdi:api
                color: '#01a180'
                tap_action:
                  action: more-info
          - type: entities
            entities:
              - entity: input_boolean.zendure_setting_soc_protection_disabled
                name: SOC Protection Disabled
              - entity: input_number.zendure_setting_minimum_allowed_state_of_charge
