              - entity: input_boolean.dashboard_setting_show_pv
              - entity: input_boolean.dashboard_setting_show_dynamic
      - type: grid
        cards:
          - type: heading
            heading: Logbook (last 4 hours)
            heading_style: title
            badges:
              - type: button
                icon: mdi:information
                tap_action:
                  action: navigate
                  navigation_path: /logbook
                color: '#01a180'
                text: More
          - type: logbook
            target:
              entity_id:
                - input_select.zendure_operation_mode
            grid_options:
              columns: 12
              rows: 12
            hours_to_show: 4
          - type: heading
            icon: ''
            heading: Version
            heading_style: title
            badges:
              - type: button
                icon: mdi:information
                text: Show Last Releasenotes
                color: '#01a180'
                tap_action:
                  action: navigate
                  navigation_path: releasenotes
            visibility:
              - condition: state
                entity: sensor.github_zendure_gielz1986_releasecheck
                state_not: Pre-release Active
          - type: heading
            icon: ''
            heading: Version
            heading_style: title
            badges:
              - type: button
                icon: mdi:information
                text: Show pre-releasenotes
                color: '#01a180'
                tap_action:
                  action: url
                  url_path: https://github.com/Gielz1986/Zendure-HA-zenSDK/pulls
            visibility:
              - condition: state
                entity: sensor.github_zendure_gielz1986_releasecheck
                state: Pre-release Active
          - type: markdown
            content: >-
              <ha-alert alert-type="info">Help text</ha-alert>Here you can see
              which package version you are using and what the latest version is
              on GitHub. You can also immediately see how many issues are open
              and go directly to GitHub from here.
            text_only: true
            visibility:
              - condition: state
                entity: input_boolean.dashboard_setting_show_help
                state: 'on'
          - type: entities
            entities:
              - entity: sensor.zendure_configuration_version
                name: Installed version
              - entity: sensor.github_zendure_gielz1986
                name: Available version
              - entity: sensor.github_zendure_gielz1986_releasecheck
                name: Releasecheck
          - type: markdown
            content: >
              &nbsp;&nbsp;[![Open
              Issues](https://img.shields.io/github/issues/Gielz1986/Zendure-HA-zenSDK?style=for-the-badge&label=Open%20Issues&labelColor=029c7b&color=0d2e2b)](https://github.com/Gielz1986/Zendure-HA-zenSDK/issues)
            grid_options:
              columns: 12
              rows: auto
            text_only: true
    cards: []
    dense_section_placement: false
  - type: sections
    max_columns: 2
    subview: true
    path: releasenotes
    title: Releasenotes
    icon: mdi:github
    sections:
      - type: grid
        cards:
          - type: markdown
            content: |
              **{{ state_attr('sensor.github_zendure_gielz1986', 'tag_name')}}**
              {{ state_attr('sensor.github_zendure_gielz1986', 'body')}}
            grid_options:
              columns: 24
              rows: auto
            text_only: true
        column_span: 2
    cards: []
