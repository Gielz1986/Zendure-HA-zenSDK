views:
  - type: sections
    max_columns: 3
    title: Zendure
    path: zendure
    sections:
      - type: grid
        cards:
          - type: heading
            icon: ''
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.zendure_power
                tap_action:
                  action: more-info
                color: '#01a180'
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.zendure_power_offgrid_outlet_1
                tap_action:
                  action: more-info
                color: '#01a180'
                visibility:
                  - condition: state
                    entity: sensor.zendure_offgrid_mode
                    state_not: Turned Off
                  - condition: numeric_state
                    entity: sensor.zendure_power_offgrid_outlet_1
                    above: 0
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.zendure_total_state_of_charge
                color: '#01a180'
                tap_action:
                  action: more-info
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.zendure_relay_switches_today
                icon: mdi:swap-vertical-bold
                color: '#01a180'
                tap_action:
                  action: more-info
            heading: Battery
          - type: markdown
            content: >-
              <ha-alert alert-type="info">Help text</ha-alert>For explanations
              of the different operation modes, see the wiki:  

              [Operation Modes (GitHub
              Wiki)](https://github.com/Gielz1986/Zendure-HA-zenSDK/wiki/Global-%E2%80%90-Operation-modes)
            text_only: true
            visibility:
              - condition: state
                entity: input_boolean.dashboard_setting_show_help
                state: 'on'
          - type: entities
            entities:
              - entity: input_select.zendure_operation_mode
                secondary_info: none
            show_header_toggle: false
            state_color: false
          - type: entities
            entities:
              - entity: input_number.zendure_manual_power
                name: Power
                secondary_info: last-changed
            visibility:
              - condition: state
                entity: input_select.zendure_operation_mode
                state: Manual
          - type: custom:apexcharts-card
            experimental:
              hidden_by_default: true
              color_threshold: true
              brush: false
            brush:
              selection_span: 1d
              apex_config:
                grid:
                  strokeDashArray: 0
                  borderColor: color-mix(in srgb, var(--divider-color) 50%, transparent)
                  show: true
                yaxis:
                  show: false
                xaxis:
                  labels:
                    show: false
                  axisTicks:
                    show: false
                  axisBorder:
                    color: color-mix(in srgb, var(--divider-color) 50%, transparent)
                chart:
                  height: 100
            cache: true
            update_interval: 15min
            stacked: true
            header:
              show: true
              show_states: true
              title: ''
            graph_span: 1d
            span:
              start: day
            series:
              - entity: sensor.zendure_power
                name: Battery
                statistics:
                  period: 5minute
                  type: mean
                  align: start
                type: area
                transform: return -x;
                stroke_width: 2
                opacity: 0.35
                extend_to: now
                color: '#01a180'
                float_precision: 0
                color_threshold:
                  - value: -2000
                    opacity: 0.5
                  - value: -1750
                    opacity: 0.45
                  - value: -1500
                    opacity: 0.4
                  - value: -1250
                    opacity: 0.35
                  - value: -1000
                    opacity: 0.3
                  - value: -750
                    opacity: 0.25
                  - value: -500
                    opacity: 0.15
                  - value: 0
                    opacity: 0.1
                  - value: 500
                    opacity: 0.15
                  - value: 750
                    opacity: 0.25
                  - value: 1000
                    opacity: 0.3
                  - value: 1250
                    opacity: 0.35
                  - value: 1500
                    opacity: 0.4
                  - value: 1750
                    opacity: 0.45
                  - value: 2000
                    opacity: 0.5
                yaxis_id: energy
                show:
                  in_brush: true
                  in_header: false
                  in_legend: true
              - entity: sensor.home_energy_meter_target
                name: Home Energy Meter
                statistics:
                  period: 5minute
                  type: mean
                  align: start
                type: area
                stroke_width: 0
                opacity: 0.3
                extend_to: now
                color: '#c0c0c2'
                float_precision: 0
                yaxis_id: energy
                show:
                  in_brush: true
                  in_header: false
                  in_legend: false
              - entity: sensor.zendure_total_state_of_charge
                name: State Of Charge
                statistics:
                  period: 5minute
                  type: max
                  align: start
                type: line
                curve: smooth
                stroke_width: 0
                opacity: 1
                extend_to: now
                color: var(--accent-color)
                float_precision: 0
                yaxis_id: percentage
                show:
                  in_header: false
                  in_legend: false
            apex_config:
              tooltip:
                x:
                  format: HH:mm
                  show: false
              xaxis:
                labels:
                  show: false
                  style:
                    colors: grey
                axisTicks:
                  show: false
                axisBorder:
                  color: color-mix(in srgb, var(--divider-color) 50%, transparent)
              yaxis:
                - title:
                    text: ''
                  decimalsInFloat: 0
                  labels:
                    style:
                      colors: >-
                        color-mix(in srgb, var(--primary-text-color) 75%,
                        transparent)
              grid:
                strokeDashArray: 0
                borderColor: color-mix(in srgb, var(--divider-color) 50%, transparent)
                show: true
              chart:
                height: 300px
                toolbar:
                  autoSelected: pan
                  show: true
                  tools:
                    download: false
                    zoom: true
                    zoomin: false
                    zoomout: false
                    pan: true
                zoom:
                  enabled: true
                  allowMouseWheelZoom: true
                  autoScaleYaxis: true
              legend:
                show: true
                floating: true
                horizontalAlign: left
                offsetX: 25
                offsetY: 17
                formatter: |
                  EVAL:function(seriesName, opts) {
                    // filter series die niet in de legenda moeten
                    if(seriesName === "State Of Charge" || seriesName === "Home Energy Meter") return "";
                    return seriesName;
                  }
              markers:
                size: 0
                hover:
                  size: 0
            visibility:
              - condition: state
                entity: input_select.zendure_operation_mode
                state_not: Manual
          - type: custom:apexcharts-card
            experimental:
              hidden_by_default: true
              color_threshold: true
              brush: false
            brush:
              selection_span: 1d
              apex_config:
                grid:
                  strokeDashArray: 0
                  borderColor: color-mix(in srgb, var(--divider-color) 50%, transparent)
                  show: true
                yaxis:
                  show: false
                xaxis:
                  labels:
                    show: false
                  axisTicks:
                    show: false
                  axisBorder:
                    color: color-mix(in srgb, var(--divider-color) 50%, transparent)
                chart:
                  height: 100
            cache: true
            update_interval: 15min
            stacked: true
            header:
              show: true
              show_states: true
              title: ''
            graph_span: 1d
            span:
              start: day
            series:
              - entity: sensor.zendure_power
                name: Battery
                statistics:
                  period: 5minute
                  type: mean
                  align: start
                type: area
                transform: return -x;
                stroke_width: 2
                opacity: 0.35
                extend_to: now
                color: '#01a180'
                float_precision: 0
                color_threshold:
                  - value: -2000
                    opacity: 0.5
                  - value: -1750
                    opacity: 0.45
                  - value: -1500
                    opacity: 0.4
                  - value: -1250
                    opacity: 0.35
                  - value: -1000
                    opacity: 0.3
                  - value: -750
                    opacity: 0.25
                  - value: -500
                    opacity: 0.15
                  - value: 0
                    opacity: 0.1
                  - value: 500
                    opacity: 0.15
                  - value: 750
                    opacity: 0.25
                  - value: 1000
                    opacity: 0.3
                  - value: 1250
                    opacity: 0.35
                  - value: 1500
                    opacity: 0.4
                  - value: 1750
                    opacity: 0.45
                  - value: 2000
                    opacity: 0.5
                yaxis_id: energy
                show:
                  in_brush: true
                  in_header: false
                  in_legend: true
              - entity: sensor.home_energy_meter_target
                name: Home Energy Meter
                statistics:
                  period: 5minute
                  type: mean
                  align: start
                type: area
                stroke_width: 0
                opacity: 0.3
                extend_to: now
                color: '#c0c0c2'
                float_precision: 0
                yaxis_id: energy
                show:
                  in_brush: true
                  in_header: false
                  in_legend: false
              - entity: sensor.zendure_total_state_of_charge
                name: State Of Charge
                statistics:
                  period: 5minute
                  type: max
                  align: start
                type: line
                curve: smooth
                stroke_width: 0
                opacity: 1
                extend_to: now
                color: var(--accent-color)
                float_precision: 0
                yaxis_id: percentage
                show:
                  in_header: false
                  in_legend: false
            apex_config:
              tooltip:
                x:
                  format: HH:mm
                  show: false
              xaxis:
                labels:
                  show: false
                  style:
                    colors: grey
                axisTicks:
                  show: false
                axisBorder:
                  color: color-mix(in srgb, var(--divider-color) 50%, transparent)
              yaxis:
                - title:
                    text: ''
                  decimalsInFloat: 0
                  labels:
                    style:
                      colors: >-
                        color-mix(in srgb, var(--primary-text-color) 75%,
                        transparent)
              grid:
                strokeDashArray: 0
                borderColor: color-mix(in srgb, var(--divider-color) 50%, transparent)
                show: true
              chart:
                height: 204px
                toolbar:
                  autoSelected: pan
                  show: true
                  tools:
                    download: false
                    zoom: true
                    zoomin: false
                    zoomout: false
                    pan: true
                zoom:
                  enabled: true
                  allowMouseWheelZoom: true
                  autoScaleYaxis: true
              legend:
                show: true
                floating: true
                horizontalAlign: left
                offsetX: 25
                offsetY: 17
                formatter: |
                  EVAL:function(seriesName, opts) {
                    // filter series die niet in de legenda moeten
                    if(seriesName === "State Of Charge" || seriesName === "Home Energy Meter") return "";
                    return seriesName;
                  }
              markers:
                size: 0
                hover:
                  size: 0
            visibility:
              - condition: state
                entity: input_select.zendure_operation_mode
                state: Manual
          - type: custom:apexcharts-card
            experimental:
              hidden_by_default: true
              color_threshold: true
            cache: false
            stacked: true
            update_interval: 5sec
            header:
              show: true
              show_states: true
              title: ''
            graph_span: 10min
            series:
              - entity: sensor.zendure_power
                name: Battery
                group_by:
                  func: avg
                  duration: 5sec
                type: area
                transform: return -x;
                offset: '-5s'
                stroke_width: 2
                opacity: 0.35
                extend_to: now
                color: '#01a180'
                float_precision: 0
                color_threshold:
                  - value: -2000
                    opacity: 0.5
                  - value: -1750
                    opacity: 0.45
                  - value: -1500
                    opacity: 0.4
                  - value: -1250
                    opacity: 0.35
                  - value: -1000
                    opacity: 0.3
                  - value: -750
                    opacity: 0.25
                  - value: -500
                    opacity: 0.15
                  - value: 0
                    opacity: 0.1
                  - value: 500
                    opacity: 0.15
                  - value: 750
                    opacity: 0.25
                  - value: 1000
                    opacity: 0.3
                  - value: 1250
                    opacity: 0.35
                  - value: 1500
                    opacity: 0.4
                  - value: 1750
                    opacity: 0.45
                  - value: 2000
                    opacity: 0.5
                yaxis_id: energy
                show:
                  in_header: false
                  in_legend: true
                  offset_in_name: false
              - entity: sensor.home_energy_meter_target
                name: Home Energy Meter
                offset: '-5s'
                group_by:
                  func: avg
                  duration: 5sec
                type: area
                stroke_width: 0
                opacity: 0.3
                extend_to: now
                color: '#c0c0c2'
                float_precision: 0
                yaxis_id: energy
                show:
                  in_header: false
                  in_legend: false
              - entity: input_number.zendure_setting_start_discharging_at
                name: Start discharging
                type: line
                stroke_width: 2
                color: var(--accent-color)
                opacity: 1
                stroke_dash: 2
                curve: stepline
                extend_to: now
                float_precision: 0
                yaxis_id: energy
                show:
                  hidden_by_default: true
                  in_header: false
              - entity: input_number.zendure_setting_start_charging_at
                name: Start charging
                type: line
                stroke_width: 2
                color: var(--accent-color)
                opacity: 1
                stroke_dash: 2
                curve: stepline
                extend_to: now
                float_precision: 0
                yaxis_id: energy
                show:
                  hidden_by_default: true
                  in_header: false
            apex_config:
              toolbar:
                show: true
                tools:
                  download: true
                  selection: true
                  zoom: true
                  zoomin: true
                  zoomout: true
                  pan: true
              tooltip:
                x:
                  format: HH:mm:ss
                  show: false
              xaxis:
                labels:
                  show: false
                  style:
                    colors: grey
                axisTicks:
                  show: false
                axisBorder:
                  color: color-mix(in srgb, var(--divider-color) 50%, transparent)
              yaxis:
                - title:
                    text: ''
                  decimalsInFloat: 0
                  labels:
                    style:
                      colors: >-
                        color-mix(in srgb, var(--primary-text-color) 75%,
                        transparent)
              grid:
                strokeDashArray: 0
                borderColor: color-mix(in srgb, var(--divider-color) 50%, transparent)
                show: true
                padding:
                  top: -10
              chart:
                height: 150px
              legend:
                show: true
                floating: true
                horizontalAlign: left
                offsetX: 25
                offsetY: 17
                formatter: |
                  EVAL:function(seriesName, opts) {
                    // filter series die niet in de legenda moeten
                    if(seriesName === "Leeg" || seriesName === "Home Energy Meter (-5s)") return "";
                    return seriesName;
                  }
              markers:
                size: 0
                hover:
                  size: 0
          - type: heading
            icon: ''
            heading: PV
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                color: var(--accent-color)
                entity: sensor.zendure_pv_passthrough
                tap_action:
                  action: more-info
              - type: entity
                show_state: true
                show_icon: true
                color: var(--accent-color)
                entity: sensor.zendure_power_pv_to_battery
                icon: mdi:battery
                visibility:
                  - condition: numeric_state
                    entity: sensor.zendure_power_pv_to_battery
                    above: 0
                tap_action:
                  action: more-info
              - type: entity
                show_state: true
                show_icon: true
                color: var(--accent-color)
                entity: sensor.zendure_power_pv_to_home
                icon: mdi:home
                visibility:
                  - condition: numeric_state
                    entity: sensor.zendure_power_pv_to_home
                    above: 0
                tap_action:
                  action: more-info
              - type: entity
                show_state: true
                show_icon: true
                color: var(--accent-color)
                entity: sensor.zendure_pv_import_daily
                tap_action:
                  action: more-info
            visibility:
              - condition: state
                entity: input_boolean.dashboard_setting_show_pv
                state: 'on'
          - type: custom:apexcharts-card
            experimental:
              hidden_by_default: true
              color_threshold: true
              brush: false
            brush:
              selection_span: 1d
              apex_config:
                grid:
                  strokeDashArray: 0
                  borderColor: color-mix(in srgb, var(--divider-color) 50%, transparent)
                  show: true
                yaxis:
                  show: false
                xaxis:
                  labels:
                    show: false
                  axisTicks:
                    show: false
                  axisBorder:
                    color: color-mix(in srgb, var(--divider-color) 50%, transparent)
                chart:
                  height: 100
            cache: true
            update_interval: 15min
            stacked: true
            header:
              show: true
              show_states: true
              title: ''
            graph_span: 1d
            span:
              start: day
            series:
              - entity: sensor.zendure_power_pv_total
                name: Total
                statistics:
                  period: 5minute
                  type: mean
                  align: start
                type: area
                stroke_width: 2
                opacity: 0.35
                extend_to: now
                color: var(--accent-color)
                float_precision: 0
                yaxis_id: energy
                show:
                  in_brush: true
                  in_header: false
                  in_legend: true
                color_threshold:
                  - value: 0
                    opacity: 0.1
                  - value: 100
                    opacity: 0.15
                  - value: 200
                    opacity: 0.25
                  - value: 300
                    opacity: 0.3
                  - value: 400
                    opacity: 0.35
                  - value: 500
                    opacity: 0.4
                  - value: 600
                    opacity: 0.45
                  - value: 700
                    opacity: 0.5
              - entity: sensor.zendure_power_pv_to_battery
                name: To Battery
                statistics:
                  period: 5minute
                  type: mean
                  align: start
                type: area
                opacity: 0
                stroke_width: 0
                extend_to: now
                color: '#01a180'
                float_precision: 0
                yaxis_id: energy
                show:
                  in_brush: true
                  in_header: false
                  in_legend: false
              - entity: sensor.zendure_power_pv_to_home
                name: To Home
                statistics:
                  period: 5minute
                  type: mean
                  align: start
                type: area
                opacity: 0.35
                stroke_width: 0
                extend_to: now
                color: '#c0c0c2'
                float_precision: 0
                yaxis_id: energy
                show:
                  in_brush: true
                  in_header: false
                  in_legend: false
            apex_config:
              tooltip:
                x:
                  format: HH:mm
                  show: false
              xaxis:
                labels:
                  show: false
                  style:
                    colors: grey
                axisTicks:
                  show: false
                axisBorder:
                  color: color-mix(in srgb, var(--divider-color) 50%, transparent)
              yaxis:
                - min: 0
                  title:
                    text: ''
                  decimalsInFloat: 0
                  labels:
                    style:
                      colors: >-
                        color-mix(in srgb, var(--primary-text-color) 75%,
                        transparent)
              grid:
                strokeDashArray: 0
                borderColor: color-mix(in srgb, var(--divider-color) 50%, transparent)
                show: true
              chart:
                height: 150px
              legend:
                show: true
                floating: true
                horizontalAlign: left
                offsetX: 25
                offsetY: 17
                formatter: |
                  EVAL:function(seriesName, opts) {
                    // filter series die niet in de legenda moeten
                    if(seriesName === "To Battery" || seriesName === "To Home") return "";
                    return seriesName;
                  }
              markers:
                size: 0
                hover:
                  size: 0
            visibility:
              - condition: state
                entity: input_boolean.dashboard_setting_show_pv
                state: 'on'
      - type: grid
        cards:
          - type: heading
            icon: ''
            heading_style: title
            heading: Control
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.home_energy_meter_power
                state_content: state
                color: '#01a180'
                icon: mdi:home
                tap_action:
                  action: more-info
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.zendure_soc_limit_status
                name: SOC-limit Status
              - entity: sensor.zendure_indication_available_energy
                name: Available Energy
              - entity: sensor.zendure_indication_remaining_discharge_time
                name: Remaining Discharge Time
              - entity: sensor.zendure_charging_mode
                name: Charging Mode
              - entity: sensor.zendure_set_discharge_power
                name: Discharge Power
              - entity: sensor.zendure_set_charge_power
                name: Charge Power
          - type: heading
            icon: ''
            heading: Zero Import
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.home_energy_zero_import_duration_today
                color: '#01a180'
                icon: mdi:leaf
                tap_action:
                  action: more-info
                name: Today
                state_content:
                  - name
                  - state
          - type: markdown
            content: >-
              <ha-alert alert-type="info">Help text</ha-alert>Here you can see
              the number of zero-import hours per day for this month and the
              previous month. This overview shows how well your days have gone
              in terms of not importing electricity. Every second that the home
              energy meter is at 0 or below is counted in the total.


              This data comes from the statistics (LTS). As a result, the graph
              is on average 1 hour behind.
            text_only: true
            visibility:
              - condition: state
                entity: input_boolean.dashboard_setting_show_help
                state: 'on'
          - type: custom:apexcharts-card
            experimental:
              hidden_by_default: true
            header:
              show: true
              title: ''
            graph_span: 2month
            span:
              start: month
              offset: '-1month'
            cache: false
            apex_config:
              yaxis:
                - decimalsInFloat: 0
                  tickAmount: 4
                  min: 0
                  max: 24
                  labels:
                    show: true
                    style:
                      colors: >-
                        color-mix(in srgb, var(--primary-text-color) 75%,
                        transparent)
              tooltip:
                x:
                  format: d/MM
                  show: false
                'y':
                  formatter: |
                    EVAL:function(value) {
                      const h = Math.floor(value);
                      const m = Math.round((value - h) * 60);
                      return h + "h " + m + "m";
                    }
              grid:
                show: true
                borderColor: color-mix(in srgb, var(--divider-color) 50%, transparent)
                strokeDashArray: 0
                padding:
                  top: -10
                row:
                  opacity: 0.5
              chart:
                height: 150px
              legend:
                show: false
                floating: true
                horizontalAlign: left
                offsetX: 0
                offsetY: 17
              xaxis:
                labels:
                  show: false
                axisTicks:
                  show: false
                axisBorder:
                  color: color-mix(in srgb, var(--divider-color) 50%, transparent)
            series:
              - entity: sensor.home_energy_zero_import_duration_today
                name: Zero Import
                statistics:
                  period: day
                  type: max
                  align: start
                type: column
                color: '#01a180'
                show:
                  in_header: false
                  in_legend: false
          - type: heading
            icon: ''
            heading_style: title
            heading: Import | Export
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.zendure_rte_total
                name: RTE
                state_content:
                  - name
                  - state
                color: '#01a180'
                icon: mdi:percent
                tap_action:
                  action: more-info
          - type: custom:apexcharts-card
            header:
              show: true
              title: ''
            graph_span: 24month
            span:
              start: month
              offset: '-23month'
            cache: false
            apex_config:
              yaxis:
                - decimalsInFloat: 0
                  tickAmount: 4
                  labels:
                    show: true
                    style:
                      colors: >-
                        color-mix(in srgb, var(--primary-text-color) 75%,
                        transparent)
              tooltip:
                x:
                  format: MM-yyyy
                  show: false
              grid:
                show: true
                borderColor: color-mix(in srgb, var(--divider-color) 50%, transparent)
                strokeDashArray: 0
                padding:
                  top: -10
              chart:
                height: 150px
              legend:
                show: false
              xaxis:
                labels:
                  show: false
                axisTicks:
                  show: false
                axisBorder:
                  color: color-mix(in srgb, var(--divider-color) 50%, transparent)
            series:
              - entity: sensor.zendure_energy_import
                name: Import
                statistics:
                  period: month
                  type: change
                  align: start
                type: column
                color: '#01a180'
                show:
                  in_header: false
              - entity: sensor.zendure_energy_export
                name: Export
