  - type: sections
    max_columns: 4
    title: Settings
    path: configuratie
    icon: mdi:cog
    sections:
      - type: grid
        cards:
          - type: heading
            icon: ''
            heading: Connected Zendure
            heading_style: title
          - type: markdown
            text_only: true
            content: >-
              {% set product = states('sensor.zendure_product_model') %}

              {% set last =
              states('input_datetime.zendure_gielz_automation_last_time_executed')
              %}

              {% set base =
              'https://cdn.jsdelivr.net/gh/Gielz1986/Zendure-HA-zenSDK@main/Devices/'
              %}


              {% if last in ['unknown', 'unavailable', '', None] %}
                <img src="{{ base }}Inactive.png" width="100">
              {% else %}
                {% set diff = as_timestamp(now()) - as_timestamp(last) %}

                {% if diff >= 120 %}
                  <img src="{{ base }}Inactive.png" width="100">
                {% else %}

                  {% if product == 'solarFlow2400AC' %}
                    <img src="{{ base }}sf_2400_ac.png" width="100">
                  {% elif product == 'solarFlow2400AC+' %}
                    <img src="{{ base }}sf_2400_ac_plus.png" width="100">
                  {% elif product == 'Hyper2000' %}
                    <img src="{{ base }}hyper_2000.png" width="100">
                  {% elif product == 'solarFlow2400Pro' %}
                    <img src="{{ base }}sf_2400_pro.png" width="100">
                  {% elif product == 'solarFlow1600AC+' %}
                    <img src="{{ base }}sf_1600_ac_plus.png" width="100">
                  {% elif product == 'solarFlow800Pro' %}
                    <img src="{{ base }}sf_800_pro.png" width="100">
                  {% elif product == 'solarFlow800Plus' %}
                    <img src="{{ base }}sf_800_plus.png" width="100">
                  {% else %}
                    <img src="{{ base }}sf_2400_ac.png" width="100">
                  {% endif %}

                {% endif %}
              {% endif %}
            grid_options:
              columns: 3
              rows: auto
          - type: markdown
            content: >-
              {% set product = states('sensor.zendure_product_model') %} {% if
              product == 'solarFlow2400AC' %} **Solarflow 2400 AC** {% elif
              product == 'solarFlow2400AC+' %} **Solarflow 2400 AC+** {% elif
              product == 'solarFlow2400Pro' %} **Solarflow 2400 Pro** {% elif
              product == 'solarFlow1600AC+' %} **Solarflow 1600 AC+** {% elif
              product == 'Hyper2000' %} **Hyper 2000** {% elif product ==
              'solarFlow800Pro' %} **Solarflow 800 Pro** {% elif product ==
              'solarFlow800Plus' %} **Solarflow 800 Plus** {% else %}
              **Onbekend** {% endif %}({{
              states('sensor.zendure_total_capacity') }} kWh)

              {{ states('sensor.zendure_serial_number') }}


              {% set last =
              states('input_datetime.zendure_gielz_automation_last_time_executed')
              %}

              {% if last not in ['unknown', 'unavailable', ''] %}
                {% set diff = as_timestamp(now()) - as_timestamp(last) %}

                **Automation Heartbeat**  
                {% if diff > 120 %}Automation Offline
                {% else %} {{ as_timestamp(last) | timestamp_custom('%Y-%m-%d %H:%M') }} (last checked)
                {% endif %}

              {% else %}
                **Incorrect entities check package**
              {% endif %}
            grid_options:
              columns: 9
              rows: auto
          - type: heading
            icon: ''
            heading: Configuration (Basic)
            heading_style: title
            badges: []
          - type: markdown
            content: >-
              <ha-alert alert-type="info">Help text</ha-alert>Enter the IP
              address of your Zendure under **Zendure 2400 AC IP address⚙️** and
              that of your HomeWizard P1 (local API must be enabled) under
              **HomeWizard P1 IP address⚙️**. If you are using a different home
              energy sensor, you can configure it via **Home Energy Meter
              Sensor⚙️**.

              Here you also set the **Standby Delay⚙️**. When the Zendure has no
              active task, it will go fully into standby after the set period.
              The consumption is then approximately 0.2 kWh per day.

              If you don’t want too much hassle, initially adopt the **Set
              Default Settings⚙️** for the behavior all at once. Afterwards,
              adjust them to your own preference.
            text_only: true
            visibility:
              - condition: state
                entity: input_boolean.dashboard_setting_show_help
                state: 'on'
          - type: entities
            entities:
              - entity: input_text.zendure_setting_ip_address
              - entity: input_text.homewizard_setting_p1_ip_address
              - entity: input_number.zendure_setting_standby_delay
                name: Standby Delay
              - entity: input_button.zendure_setting_set_default_settings
                name: Set Default Settings
          - type: heading
            icon: ''
            heading: Configuration (Charging)
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.zendure_inverter_max_charge_power
                icon: mdi:api
                color: '#01a180'
                tap_action:
                  action: more-info
          - type: markdown
            content: >-
              <ha-alert alert-type="info">Help text</ha-alert>Set the maximum
              charging power of your Zendure here and choose when you want it to
              start charging during **Smart Matching** and how much buffer it
              should maintain between feeding back to the grid and net zero.
            text_only: true
            visibility:
              - condition: state
                entity: input_boolean.dashboard_setting_show_help
                state: 'on'
          - type: entities
            entities:
              - entity: input_number.zendure_setting_max_charge_power
                name: Max. Charge Power
              - entity: input_number.zendure_setting_start_charging_at
