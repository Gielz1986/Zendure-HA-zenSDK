                tap_action:
                  action: more-info
          - type: markdown
            content: >-
              <ha-alert alert-type="info">Help text</ha-alert>Set the maximum
              discharge power of your Zendure here and choose when you want it
              to start discharging during **Smart Matching** and how much extra
              buffer it should discharge beyond net zero.
            text_only: true
            visibility:
              - condition: state
                entity: input_boolean.dashboard_setting_show_help
                state: 'on'
          - type: entities
            entities:
              - entity: input_number.zendure_setting_max_discharge_power
                name: Max Discharge Power
              - entity: input_number.zendure_setting_start_discharging_at
                name: Start Discharge At
              - entity: input_number.zendure_setting_discharge_buffer
                name: Discharge Buffer
      - type: grid
        cards:
          - type: heading
            icon: ''
            heading: Configuration (State Of Charge)
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.zendure_minimum_state_of_charge
