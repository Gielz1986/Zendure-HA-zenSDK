              sn: "{{ states('sensor.zendure_serienumber') }}"
              inputLimit: >-
                {{ states('input_number.zendure_setting_max_charge_power') | int
                }}
          - action: logbook.log
            data:
              message: 💲 Dynamisch goedkoop laden gestart —
              entity_id: input_select.zendure_operation_mode
              name: " "
          - wait_for_trigger:
              - entity_id: sensor.dynamic_lowest_price_period
                to: Nee
                trigger: state
              - trigger: template
                value_template: >
                  {{ states('sensor.zendure_total_electricity_level') | float(0)
                  ==
                     states('sensor.zendure_maximum_electricity_level') | float(0) }}
                alias: Maximale ingestelde SOC bereikt
              - trigger: state
                entity_id:
                  - input_select.zendure_operation_mode
              - trigger: state
                entity_id:
                  - input_number.dynamic_setting_minimal_spread
              - trigger: state
                entity_id:
                  - sensor.dynamic_spread_indication
            continue_on_timeout: false
          - action: rest_command.zendure_stop_with_everything
            data:
              sn: "{{ states('sensor.zendure_serienumber') }}"
          - action: input_boolean.turn_on
            data: {}
            target:
              entity_id: input_boolean.dynamic_recently_charged
          - action: input_boolean.turn_off
            target:
              entity_id:
                - input_boolean.dynamic_charging_running
            data: {}
          - action: logbook.log
            data:
              message: 💲 Dynamisch goedkoop laden voltooid  —
              entity_id: input_select.zendure_operation_mode
              name: " "
        alias: Dynamisch goedkoop laden
      - conditions:
          - condition: trigger
            id:
              - aansturing_trigger
          - condition: template
            value_template: >-
              {{
              states('input_text.dynamic_setting_nordpool_sensor').lower().startswith('sensor')
              }}
            alias: input_text.dynamic_setting_nordpool_sensor is gevuld
          - condition: or
            conditions:
              - condition: state
                entity_id: input_select.zendure_operation_mode
                state:
                  - Dynamisch Handelen
              - condition: state
                entity_id: input_select.zendure_operation_mode
                state:
                  - Dynamisch Handelen + NOM
          - condition: state
            entity_id: sensor.zendure_soc_limit_status
            state:
              - Normal Operation
              - Charging Limit Reached
              - unknown
          - alias: Tot de minimaal ingestelde SOC
            condition: template
            value_template: |
              {{ states('sensor.zendure_total_electricity_level') | float >
               states('sensor.zendure_minimum_electricity_level') | float }}
          - condition: state
            entity_id: sensor.dynamic_highest_price_period
            state:
              - Ja
          - alias: >-
              sensor.dynamic_spread_indication moet hoger of gelijk zijn aan
              input_number.dynamic_setting_minimal_spread
            condition: template
            value_template: >-
              {{ states('sensor.dynamic_spread_indication') | float >=
              states('input_number.dynamic_setting_minimal_spread') | float }}
          - condition: state
            entity_id: input_boolean.dynamic_discharging_running
            state:
              - "off"
        sequence:
          - action: input_boolean.turn_on
            data: {}
            target:
              entity_id:
                - input_boolean.dynamic_discharging_running
          - action: rest_command.zendure_save_in_ram
            data:
              sn: "{{ states('sensor.zendure_serienumber') }}"
          - delay:
              hours: 0
              minutes: 0
              seconds: 5
              milliseconds: 0
          - action: rest_command.zendure_quick_discharge
            data:
              sn: "{{ states('sensor.zendure_serienumber') }}"
              outputLimit: >-
                {{ states('input_number.zendure_setting_max_discharge_power') |
                int }}
          - action: logbook.log
            data:
              message: 💲 Dynamisch duur ontladen gestart —
              entity_id: input_select.zendure_operation_mode
              name: " "
          - wait_for_trigger:
              - alias: Tot minimale SOC
                trigger: template
                value_template: |-
                  {{ states('sensor.zendure_total_electricity_level') | float <=
                     states('sensor.zendure_minimum_electricity_level') | float }}
              - entity_id:
                  - sensor.dynamic_highest_price_period
                to:
                  - Nee
                trigger: state
              - trigger: state
                entity_id:
                  - input_select.zendure_operation_mode
              - trigger: state
                entity_id:
                  - input_number.dynamic_setting_minimal_spread
              - trigger: state
                entity_id:
                  - sensor.dynamic_spread_indication
            continue_on_timeout: false
          - action: rest_command.zendure_stop_with_everything
            data:
              sn: "{{ states('sensor.zendure_serienumber') }}"
          - action: input_boolean.turn_off
            target:
              entity_id:
                - input_boolean.dynamic_discharging_running
            data: {}
          - action: logbook.log
            data:
              message: 💲 Dynamisch duur ontladen voltooid  —
              entity_id: input_select.zendure_operation_mode
              name: " "
        alias: Dynamisch duur ontladen
mode: parallel
