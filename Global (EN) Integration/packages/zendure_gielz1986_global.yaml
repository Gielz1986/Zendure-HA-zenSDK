input_select:
  zendure_operation_mode:
    name: Zendure Operation Mode
    icon: mdi:battery-charging-wireless
    options:
      - Standby
      - Manual
      - Smart Matching
      - Smart Discharge Only
      - Smart Charge Only
      - Dynamic Smart Matching
      - Dynamic Smart Matching (Expensive)
      - Dynamic Trading
      - Dynamic Trading + Smart Matching
      - Quick Charge
      - Quick Discharge

input_button:
  zendure_setting_set_default_settings:
    name: Zendure Set Default Settings
    icon: mdi:hand-pointer

input_boolean:
  dynamic_setting_15_minute_interval:
    name: Dynamic 15 Minutes Interval
    icon: mdi:clock-time-three-outline

  dynamic_recently_charged:
    name: Dynamic Recently Charged
    icon: mdi:battery-check

  dynamic_charging_running:
    name: Dynamic Charging Running
    icon: mdi:battery-check

  dynamic_discharging_running:
    name: Dynamic Discharging Running
    icon: mdi:battery-check

  dashboard_setting_show_dynamic:
    name: Show Dynamic On Dasbhaord
    icon: mdi:cash

  dashboard_setting_show_help:
    name: Show Help On Dashboard
    icon: mdi:information-outline

input_text:
  zendure_setting_battery_order:
    name: Zendure Battery Order
    icon: mdi:flip-vertical
    max: 11
    mode: text

  zendure_setting_ip_address:
    name: Zendure IP-address
    icon: mdi:ip
    max: 50
    mode: text

  homewizard_setting_p1_ip_address:
    name: Homewizard P1 IP-address
    icon: mdi:ip
    max: 50
    mode: text

  home_energy_setting_meter_sensor:
    name: Home Energy Meter Sensor
    icon: mdi:transmission-tower
    max: 250
    mode: text

  dynamic_setting_nordpool_sensor:
    name: Dynamic Nordpool Sensor
    icon: mdi:cash
    max: 250
    mode: text

  dynamic_manual_period:
    name: Dynamic Manual Period
    icon: mdi:view-grid
    max: 250
    mode: text

  dynamic_manual_period_tomorrow:
    name: Dynamic Manual Period Tomorrow
    icon: mdi:view-grid
    max: 250
    mode: text

input_number:
  zendure_setting_max_charge_power:
    name: Zendure Maximum Charge Power
    icon: mdi:format-vertical-align-top
    min: 800
    max: 7200
    step: 1
    mode: box
    unit_of_measurement: "W"

  zendure_setting_max_discharge_power:
    name: Zendure Maximum Discharge Power
    icon: mdi:format-vertical-align-bottom
    min: 800
    max: 7200
    step: 1
    mode: box
    unit_of_measurement: "W"

  zendure_setting_start_discharging_at:
    name: Zendure Start Discharging At
    icon: mdi:battery-minus-variant
    min: 100
    max: 500
    step: 1
    mode: box
    unit_of_measurement: "W"

  zendure_setting_start_charging_at:
    name: Zendure Start Charging At
    icon: mdi:battery-plus-variant
    min: -1000
    max: -100
    step: 1
    mode: box
    unit_of_measurement: "W"

  zendure_setting_standby_delay:
    name: Zendure Standby Delay
    icon: mdi:pause
    min: 5
    max: 30
    step: 1
    mode: box
    unit_of_measurement: "Min"

  zendure_setting_charge_buffer:
    name: Zendure Charge Buffer
    icon: mdi:arrow-expand-vertical
    min: 0
    max: 250
    step: 1
    mode: box
    unit_of_measurement: "W"

  zendure_setting_discharge_buffer:
    name: Zendure Discharge Buffer
    icon: mdi:arrow-expand-vertical
    min: 0
    max: 250
    step: 1
    mode: box
    unit_of_measurement: "W"

  zendure_manual_power:
    name: Zendure Manual Power
    icon: mdi:flash
    min: -7200
    max: 7200
    step: 1
    mode: box
    unit_of_measurement: "W"

  dynamic_setting_minimal_spread:
    name: Dynamic Minimal Spread
    icon: mdi:percent-box
    min: 0
    max: 100
    step: 1
    unit_of_measurement: '%'
    mode: box

  dynamic_lowest_price_x_period:
    name: Dynamic Lowest Price X Period
    icon: mdi:view-grid-plus
    min: 0
    max: 96
    step: 1
    mode: box

  dynamic_highest_price_x_period:
    name: Dynamic Highest Price X Period
    icon: mdi:view-grid-plus
    min: 0
    max: 96
    step: 1
    mode: box

  dynamic_lowest_price_x_period_tomorrow:
    name: Dynamic Lowest Price X Period Tomorrow
    icon: mdi:view-grid-plus
    min: 0
    max: 96
    step: 1
    mode: box

  dynamic_highest_price_x_period_tomorrow:
    name: Dynamic Highest Price X Period Tomorrow
    icon: mdi:view-grid-plus
    min: 0
    max: 96
    step: 1
    mode: box

sensor:
  - platform: history_stats
    name: "Home Energy Zero Import Duration Today"
    unique_id: home_energy_zero_import_duration_today
    entity_id: binary_sensor.home_energy_zero_import_active
    state: "on"
    type: time
    start: "{{ today_at() if now() < today_at('23:59') else now() }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: "Zendure Relay Switches Charging Today"
    unique_id: zendure_relay_switches_charging_today
    entity_id: sensor.zendure_charging_mode
    state: "Charging"
    type: count
    start: "{{ today_at() if now() < today_at('23:59') else now() }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: "Zendure Relay Switches Discharging Today"
    unique_id: zendure_relay_switches_discharging_today
    entity_id: sensor.zendure_charging_mode
    state: "Discharging"
    type: count
    start: "{{ today_at() if now() < today_at('23:59') else now() }}"
    end: "{{ now() }}"

  - platform: statistics
    name: "Zendure Import Efficiency 24h"
    unique_id: zendure_import_efficiency_24h
    entity_id: sensor.zendure_import_efficiency
    state_characteristic: mean
    sampling_size: 86400
    max_age:
      hours: 24

  - platform: statistics
    name: "Zendure Export Efficiency 24h"
    unique_id: zendure_export_efficiency_24h
    entity_id: sensor.zendure_export_efficiency
    state_characteristic: mean
    sampling_size: 86400
    max_age:
      hours: 24

  - platform: integration
    name: "Zendure Energy Import"
    unique_id: zendure_energy_import
    source: sensor.zendure_power_import
    unit_prefix: k
    round: 2
    method: trapezoidal

  - platform: integration
    name: "Zendure Energy Export"
    unique_id: zendure_energy_export
    source: sensor.zendure_power_export
    unit_prefix: k
    round: 2
    method: trapezoidal

  - platform: rest
    name: "GitHub Zendure Gielz1986"
    unique_id: github_zendure_gielz1986
    resource: "https://api.github.com/repos/Gielz1986/Zendure-HA-zenSDK/releases/latest"
    headers:
      User-Agent: "HomeAssistant"
    scan_interval: 3600
    json_attributes:
      - tag_name
      - name
      - published_at
      - body
    value_template: "{{ value_json.name }}"
    icon: mdi:github

template:
  - binary_sensor:
      - name: "Home Energy Zero Import Active"
        unique_id: home_energy_zero_import_active
        device_class: power
        state: "{{ states('sensor.home_energy_meter_power') | float(0) < 1 }}"
        icon: >
          {% if states('sensor.home_energy_meter_power') | float(0) < 1 %}
            mdi:leaf
          {% else %}
            mdi:flash
          {% endif %}

  - trigger:
      - platform: state
        entity_id: sensor.zendure_total_electricity_level
        to: "100"

    sensor:
      - name: "Zendure Last Calibration"
        unique_id: zendure_last_calibration
        device_class: timestamp
        icon: mdi:sync
        state: >
          {% if trigger.platform == 'state' %}
            {{ now().isoformat() }}
          {% else %}
            {{ this.state }}
          {% endif %}

  - sensor:
      - name: "Zendure Configuration Version"
        unique_id: zendure_configuration_version
        icon: mdi:one-up
        state: "v20260331"

      - name: "Zendure Last Calibration (Days)"
        unique_id: zendure_last_calibration_days
        unit_of_measurement: "d"
        state: >
         {% set last = states('sensor.zendure_last_calibration') %}
         {% if last in ['unknown','unavailable',''] %}
           0
         {% else %}
         {{ (now().date() - as_datetime(last).date()).days }}
         {% endif %}
        icon: >
         {% if this.state | int < 29 %}
           mdi:thumb-up
         {% else %}
           mdi:thumb-down
         {% endif %}

      - name: "Github Zendure Gielz1986 Releasecheck"
        unique_id: github_zendure_gielz1986_releasecheck
        state: >
          {% set config_date = states('sensor.zendure_configuration_version')
            | regex_findall('v(\d{8})') | first %}
          {% set github_raw = state_attr('sensor.github_zendure_gielz1986', 'tag_name') %}
          {% if github_raw in ['unknown', 'unavailable', None] %}
          {% set github_date = None %}
          {% else %}
          {% set github_date = github_raw | regex_replace('v','') %}
          {% endif %}
          {% if config_date and github_date %}
          {% if config_date > github_date %}
            Pre-release Active
          {% elif config_date < github_date %}
            New Release On GitHub
          {% else %}
            Up-to-date
          {% endif %}
          {% else %}
            Unknown
          {% endif %}
        icon: >
         {% if this.state == 'Up-to-date' %}
          mdi:emoticon-happy-outline
         {% elif this.state == 'New Release On GitHub' %}
          mdi:emoticon-sad-outline
         {% elif this.state == 'Pre-release Active' %}
          mdi:test-tube
         {% else %}
          mdi:emoticon-sad-outline
         {% endif %}

      - name: "Home Energy Meter Target"
        unique_id: home_energy_meter_target
        unit_of_measurement: "W"
        state_class: measurement
        device_class: power
        state: > 
         {{ (states('sensor.home_energy_meter_power') | float(0) + (states('sensor.zendure_power') | float(0) * -1)) | round(0) }}

      - name: "Zendure Relay Switches Today"
        unique_id: zendure_relay_switches_today
        icon: mdi:swap-vertical-bold
        state_class: total_increasing
        state: >
          {% set ontladen = states('sensor.zendure_relay_switches_charging_today') | int %}
          {% set opladen = states('sensor.zendure_relay_switches_charging_today') | int %}
          {% set totaal = ontladen + opladen - 1 %}
          {{ totaal if totaal > 0 else 0 }}

      - name: "Home Energy Meter Power"
        unique_id: home_energy_meter_power
        unit_of_measurement: "W"
        state_class: measurement
        device_class: power
        state: >
         {% set afwijkend = states('input_text.home_energy_setting_meter_sensor') %}
         {% if afwijkend | lower | regex_match('^sensor\\..+') and states(afwijkend) not in ['unknown', 'unavailable', 'none'] %}
         {{ states(afwijkend) | float(0) }}
         {% else %}
         {{ states('sensor.homewizard_p1_power') | float(0) }}
         {% endif %}

      - name: "Dynamic Nordpool"
        unique_id: dynamic_nordpool
        icon: mdi:cash
        unit_of_measurement: "€/kWh"
        state: >-
          {% set ingevuld = states('input_text.dynamic_setting_nordpool_sensor') %}
          {% if ingevuld | lower | regex_match('^sensor\\..+') and states(ingevuld) not in ['unknown', 'unavailable', 'none'] %}
            {% set nordpool = ingevuld %}
          {% else %}
            {% set nordpool = none %}
          {% endif %}

          {% if nordpool is not none %}
            {% set use_15_min = is_state('input_boolean.dynamic_setting_15_minute_interval', 'on') %}
            {% if use_15_min %}
              {% set data = state_attr(nordpool, 'raw_today') or [] %}
              {% set nowts = as_timestamp(now()) %}
              {% set current = namespace(val=None) %}
              {% for p in data %}
                {% set s = as_timestamp(as_datetime(p.start)) %}
                {% set e = as_timestamp(as_datetime(p.end)) %}
                {% if nowts >= s and nowts < e %}
                  {% set current.val = (p.value) | round(5) %}
                {% endif %}
              {% endfor %}
              {{ current.val if current.val is not none else 'unknown' }}
            {% else %}
              {% set raw = state_attr(nordpool, 'raw_today') %}
              {% set nu = now() %}
              {% if raw %}
                {% set current_hour_values = raw 
                  | selectattr('start', '>=', nu.replace(minute=0, second=0, microsecond=0)) 
                  | selectattr('start', '<', nu.replace(minute=0, second=0, microsecond=0) + timedelta(hours=1)) 
                  | map(attribute='value') 
                  | list %}
                {% if current_hour_values %}
                  {{ (current_hour_values | sum / current_hour_values | count) | round(5) }}
                {% else %}
                  {{ states(nordpool) }}
                {% endif %}
              {% else %}
                {{ states(nordpool) }}
              {% endif %}
            {% endif %}
          {% else %}
            0
          {% endif %}
        attributes:
          raw_today: >-
            {% set ingevuld = states('input_text.dynamic_setting_nordpool_sensor') %}
            {% if ingevuld | lower | regex_match('^sensor\\..+') and states(ingevuld) not in ['unknown', 'unavailable', 'none'] %}
              {% set nordpool = ingevuld %}
            {% else %}
              {% set nordpool = none %}
            {% endif %}

            {% if nordpool is not none %}
              {% set use_15_min = is_state('input_boolean.dynamic_setting_15_minute_interval', 'on') %}
              {% set raw = state_attr(nordpool, 'raw_today') %}
              {% if raw %}
                [
                {% if use_15_min %}
                  {% for item in raw %}
                    {
                      "start": "{{ item.start.isoformat() }}",
                      "end": "{{ item.end.isoformat() }}",
                      "value": {{ item.value }}
                    }{% if not loop.last %},{% endif %}
                  {% endfor %}
                {% else %}
                  {% set hourly = raw | groupby('start.hour') %}
                  {% for hour_group in hourly %}
                    {% set values = hour_group.list | map(attribute='value') | list %}
                    {% set hour_start = hour_group.list[0].start.replace(minute=0, second=0, microsecond=0) %}
                    {% set hour_end = hour_start + timedelta(hours=1) %}
                    {
                      "start": "{{ hour_start.isoformat() }}",
                      "end": "{{ hour_end.isoformat() }}",
                      "value": {{ (values | sum / values | count) | round(5) }}
                    }{% if not loop.last %},{% endif %}
                  {% endfor %}
                {% endif %}
                ]
              {% else %}
                []
              {% endif %}
            {% else %}
              []
            {% endif %}
          raw_tomorrow: >-
            {% set ingevuld = states('input_text.dynamic_setting_nordpool_sensor') %}
            {% if ingevuld | lower | regex_match('^sensor\\..+') and states(ingevuld) not in ['unknown', 'unavailable', 'none'] %}
              {% set nordpool = ingevuld %}
            {% else %}
              {% set nordpool = none %}
            {% endif %}

            {% if nordpool is not none %}
              {% set use_15_min = is_state('input_boolean.dynamic_setting_15_minute_interval', 'on') %}
              {% set raw = state_attr(nordpool, 'raw_tomorrow') %}
              {% if raw %}
                [
                {% if use_15_min %}
                  {% for item in raw %}
                    {
                      "start": "{{ item.start.isoformat() }}",
                      "end": "{{ item.end.isoformat() }}",
                      "value": {{ item.value }}
                    }{% if not loop.last %},{% endif %}
                  {% endfor %}
                {% else %}
                  {% set hourly = raw | groupby('start.hour') %}
                  {% for hour_group in hourly %}
                    {% set values = hour_group.list | map(attribute='value') | list %}
                    {% set hour_start = hour_group.list[0].start.replace(minute=0, second=0, microsecond=0) %}
                    {% set hour_end = hour_start + timedelta(hours=1) %}
                    {
                      "start": "{{ hour_start.isoformat() }}",
                      "end": "{{ hour_end.isoformat() }}",
                      "value": {{ (values | sum / values | count) | round(5) }}
                    }{% if not loop.last %},{% endif %}
                  {% endfor %}
                {% endif %}
                ]
              {% else %}
                []
              {% endif %}
            {% else %}
              []
            {% endif %}
          max_tomorrow: >-
            {% set data = state_attr('sensor.dynamic_nordpool','raw_tomorrow') %}
            {% if data %}
            {{ data | map(attribute='value') | max | round(5) }}
            {% else %}
              0
            {% endif %}
          min_tomorrow: >-
            {% set data = state_attr('sensor.dynamic_nordpool','raw_today') %}
            {% if data %}
            {{ data | map(attribute='value') | min | round(5) }}
            {% else %}
              0
            {% endif %}
          max_today: >-
            {% set data = state_attr('sensor.dynamic_nordpool','raw_today') %}
            {% if data %}
            {{ data | map(attribute='value') | max | round(5) }}
            {% else %}
              0
            {% endif %}
          min_today: >-
            {% set data = state_attr('sensor.dynamic_nordpool','raw_today') %}
            {% if data %}
            {{ data | map(attribute='value') | min | round(5) }}
            {% else %}
              0
            {% endif %}

      - name: "Dynamic Spread Indication"
        unique_id: dynamic_spread_indication
        icon: mdi:percent-box
        unit_of_measurement: "%"
        state: >
          {% set uren = state_attr('sensor.dynamic_lowest_price_period', 'raw_today') or [] %}
          {% set goedkoop = uren | selectattr('goedkoop','equalto','Yes') | list %}
          {% set duur = uren | selectattr('duur','equalto','Yes') | list %}
          {% if goedkoop | count > 0 and duur | count > 0 %}
            {% set avg_goedkoop = goedkoop | map(attribute='value') | sum / goedkoop | count %}
            {% set avg_duur = duur | map(attribute='value') | sum / duur | count %}
            {{ ((avg_duur - avg_goedkoop) / avg_goedkoop * 100) | round(1) }}
          {% else %}
            0
          {% endif %}
        attributes:
          manual_periods: >
            {% if states('input_text.dynamic_manual_period') | length > 0 %}
              n.v.t.
            {% else %}
              {% set uren = state_attr('sensor.dynamic_lowest_price_period', 'raw_today') or [] %}
              {% set ns = namespace(result=[]) %}
              {% for uur in uren %}
                {% if uur.goedkoop == 'Yes' %}
                  {% set ns.result = ns.result + ['G' ~ (uur.start | as_datetime).strftime('%H:%M')] %}
                {% elif uur.duur == 'Yes' %}
                  {% set ns.result = ns.result + ['D' ~ (uur.start | as_datetime).strftime('%H:%M')] %}
                {% endif %}
              {% endfor %}
              {{ ns.result | join(';') }}
            {% endif %}
          lowest_price_periods: >
            {% set uren = state_attr('sensor.dynamic_lowest_price_period', 'raw_today') or [] %}
            {% set goedkoop = uren | selectattr('goedkoop','equalto','Yes') | sort(attribute='start') | list %}
            [
            {% for uur in goedkoop %}
              "{{ (uur.start | as_datetime).strftime('%H:%M') }} - €{{ '%.4f' | format(uur.value) }}"
              {% if not loop.last %}, {% endif %}
            {% endfor %}
            ]
          highest_price_periods: >
            {% set uren = state_attr('sensor.dynamic_lowest_price_period', 'raw_today') or [] %}
            {% set duur = uren | selectattr('duur','equalto','Yes') | sort(attribute='start') | list %}
            [
            {% for uur in duur %}
              "{{ (uur.start | as_datetime).strftime('%H:%M') }} - €{{ '%.4f' | format(uur.value) }}"
              {% if not loop.last %}, {% endif %}
            {% endfor %}
            ]
          average_lowest_price: >
            {% set uren = state_attr('sensor.dynamic_lowest_price_period', 'raw_today') or [] %}
            {% set goedkoop = uren | selectattr('goedkoop','equalto','Yes') | list %}
            {% if goedkoop | count > 0 %}
              €{{ '%.4f' % (goedkoop | map(attribute='value') | sum / goedkoop | count) }}
            {% else %}
              n.v.t.
            {% endif %}
          average_highest_price: >
            {% set uren = state_attr('sensor.dynamic_lowest_price_period', 'raw_today') or [] %}
            {% set duur = uren | selectattr('duur','equalto','Yes') | list %}
            {% if duur | count > 0 %}
              €{{ '%.4f' % (duur | map(attribute='value') | sum / duur | count) }}
            {% else %}
              n.v.t.
            {% endif %}
          difference_in_value: >
            {% set g = state_attr('sensor.dynamic_spread_indication','average_lowest_price') %}
            {% set d = state_attr('sensor.dynamic_spread_indication','average_highest_price') %}
            {% if g not in ['n.v.t.', None] and d not in ['n.v.t.', None] %}
              €{{ '%.4f' % (d[1:] | float - g[1:] | float) }}
            {% else %}
              n.v.t.
            {% endif %}

      - name: "Dynamic Spread Indication DSC"
        unique_id: dynamic_spread_indication_dsc
        icon: mdi:percent-box
        unit_of_measurement: "%"
        state: >
          {% set uren = state_attr('sensor.dynamic_lowest_price_period', 'raw_today') or [] %}
          {% set duurste = state_attr('sensor.dynamic_lowest_price_period', 'duurste_na_eerste_goedkope') or [] %}

          {% set goedkope_uren = uren | selectattr('goedkoop','equalto','Yes') | list %}
          {% set dure_uren = duurste | list %}

          {% if goedkope_uren | count > 0 and dure_uren | count > 0 %}
            {% set avg_goedkoop = goedkope_uren | map(attribute='value') | sum / goedkope_uren | count %}
            {% set avg_duur = dure_uren | map(attribute='value') | sum / dure_uren | count %}
            {{ ((avg_duur - avg_goedkoop) / avg_goedkoop * 100) | round(1) }}
          {% else %}
            0
          {% endif %}
        attributes:
          manual_periods: >
            {% if states('input_text.dynamic_manual_period') | length > 0 %}
              n.v.t.
            {% else %}
              {% set uren = state_attr('sensor.dynamic_lowest_price_period', 'raw_today') or [] %}
              {% set ns = namespace(result=[]) %}
              {% for uur in uren %}
                {% if uur.goedkoop == 'Yes' %}
                  {% set ns.result = ns.result + ['G' ~ (uur.start | as_datetime).strftime('%H:%M')] %}
                {% elif uur.duur == 'Yes' %}
                  {% set ns.result = ns.result + ['D' ~ (uur.start | as_datetime).strftime('%H:%M')] %}
                {% endif %}
              {% endfor %}
              {{ ns.result | join(';') }}
            {% endif %}
          lowest_price_periods: >
            {% set uren = state_attr('sensor.dynamic_lowest_price_period', 'raw_today') or [] %}
            {% set goedkoop = uren | selectattr('goedkoop','equalto','Yes') | sort(attribute='start') | list %}
            [
            {% for uur in goedkoop %}
              "{{ (uur.start | as_datetime).strftime('%H:%M') }} - €{{ '%.4f' | format(uur.value) }}"
              {% if not loop.last %}, {% endif %}
            {% endfor %}
            ]
          highest_price_periods: >
            {% set uren = state_attr('sensor.dynamic_lowest_price_period', 'duurste_na_eerste_goedkope') or [] %}
            {% set duur = uren | sort(attribute='value', reverse=true) | list %}
            [
            {% for uur in duur %}
              "{{ (uur.start | as_datetime).strftime('%H:%M') }} - €{{ '%.4f' | format(uur.value) }}"
              {% if not loop.last %}, {% endif %}
            {% endfor %}
            ]
          average_lowest_price: >
            {% set uren = state_attr('sensor.dynamic_lowest_price_period', 'raw_today') or [] %}
            {% set goedkoop = uren | selectattr('goedkoop','equalto','Yes') | list %}
            {% if goedkoop | count > 0 %}
              €{{ '%.4f' % (goedkoop | map(attribute='value') | sum / goedkoop | count) }}
            {% else %}
              n.v.t.
            {% endif %}
          average_highest_price: >
            {% set uren = state_attr('sensor.dynamic_lowest_price_period', 'duurste_na_eerste_goedkope') or [] %}
            {% set duur = uren | selectattr('duur','equalto','Yes') | list %}
            {% if duur | count > 0 %}
              €{{ '%.4f' % (duur | map(attribute='value') | sum / duur | count) }}
            {% else %}
