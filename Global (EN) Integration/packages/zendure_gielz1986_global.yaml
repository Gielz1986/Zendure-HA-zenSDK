        device_class: voltage
        icon: mdi:sine-wave

      - name: "Zendure Indication Remaining  Discharge Time"
        value_template: >
         {% set vermogen = states('sensor.zendure_power') | float(0) %}
         {% set energie = states('sensor.zendure_indication_available_energy') | float(0) %}
         {% if vermogen < 0 %}
         {% set ontlaadvermogen_kw = (vermogen | abs) / 1000 %}
         {% if ontlaadvermogen_kw > 0 %}
           {% set uren = energie / ontlaadvermogen_kw %}
           {% set total_minutes = (uren * 60) | int %}
           {% set hours = total_minutes // 60 %}
           {% set minutes = total_minutes % 60 %}
           {{ hours }}h {{ minutes }}m
         {% else %}
           Unknown
         {% endif %}
         {% else %}
           Not Discharging
         {% endif %}
        icon: mdi:clock-time-eight-outline
        unique_id: zendure_indication_remaining_discharge_time

      - name: "Zendure Inverter Temperature"
        value_template: >
          {% set maxTemp = value_json['properties']['hyperTmp'] | int %}
          {{ (maxTemp - 2731) / 10.0 }}
