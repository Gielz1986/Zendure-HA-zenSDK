                  "goedkoop": "{{ uur.goedkoop }}",
                  "duur": "Yes"
                }{% if not loop.last %},{% endif %}
              {% endfor %}
              ]
            {% else %}
              []
            {% endif %}

      - name: "Zendure Export Efficiency"
        unique_id: zendure_export_efficiency
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:percent-box
        state: >
          {% set ac = states('sensor.zendure_power_export') | float(0) %}
          {% set dc = states('sensor.zendure_power_export_dc') | float(0) %}
          {% if ac > 0 and dc > 0 %}
            {% set efficiency = (ac / dc) * 100 %}
            {{ [0, [efficiency, 100] | min] | max | round(1) }}
          {% else %}
            0
          {% endif %}

      - name: "Zendure Import Efficiency"
        unique_id: zendure_import_efficiency
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:percent-box
        state: >
          {% set ac = states('sensor.zendure_power_import') | float(0) %}
          {% set dc = states('sensor.zendure_power_import_dc') | float(0) %}
          {% if ac > 0 and dc > 0 %}
            {% set efficiency = (dc / ac) * 100 %}
            {{ [0, [efficiency, 100] | min] | max | round(1) }}
          {% else %}
            0
          {% endif %}

      - name: "Zendure Indication Available Energy"
        unique_id: zendure_indication_available_energy
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:lightning-bolt-circle
        state: >
          {% set laad = states('sensor.zendure_total_electricity_level') | float(0) %}
          {% set min_laad = states('sensor.zendure_minimum_electricity_level') | float(0) %}
          {% set max_laad = states('sensor.zendure_maximum_electricity_level') | float(100) %}
          {% set totale_capaciteit = states('sensor.zendure_total_capacity') | float(0) %}

          {% set export_eff = states('sensor.zendure_export_efficiency_24u') | float(0) %}
          {% set rte_totaal = states('sensor.zendure_rte_total') | float(0) %}

          {% set effectief_laad = [laad, max_laad] | min %}
          {% set rte_export_equivalent = (rte_totaal / 100) ** 0.5 * 100 %}

          {% if export_eff < 70 %}
            {% set effectieve_eff = rte_export_equivalent %}
          {% else %}
            {% set effectieve_eff = export_eff %}
          {% endif %}

          {% set effectieve_eff = [effectieve_eff, 100] | min / 100 %}
          {% set bruikbaar_percentage = effectief_laad - min_laad %}

          {% if bruikbaar_percentage <= 0 %}
            0
          {% else %}
            {{ (bruikbaar_percentage / 100 * totale_capaciteit * effectieve_eff) | round(2) }}
          {% endif %}
        attributes:
          total_capacity_kwh: >
            {{ states('sensor.zendure_total_capacity') }}
          indication_available_energy_(without_loss): >
            {% set laad = states('sensor.zendure_total_electricity_level') | float(0) %}
            {% set min_laad = states('sensor.zendure_minimum_electricity_level') | float(0) %}
            {% set max_laad = states('sensor.zendure_maximum_electricity_level') | float(100) %}
            {% set totale_capaciteit = states('sensor.zendure_total_capacity') | float(0) %}

            {% set effectief_laad = [laad, max_laad] | min %}
            {% set bruikbaar_percentage = effectief_laad - min_laad %}

            {% if bruikbaar_percentage <= 0 %}
              0
            {% else %}
              {{ (bruikbaar_percentage / 100 * totale_capaciteit) | round(2) }}
            {% endif %}
          usable_percentage: >
            {% set laad = states('sensor.zendure_total_electricity_level') | float(0) %}
            {% set min_laad = states('sensor.zendure_minimum_electricity_level') | float(0) %}
            {% set max_laad = states('sensor.zendure_maximum_electricity_level') | float(100) %}
            {{ ([laad, max_laad] | min - min_laad) | round(1) }} %
          used_export_efficiency: >
            {% set export_eff = states('sensor.zendure_export_efficiency_24u') | float(0) %}
            {% set rte_totaal = states('sensor.zendure_rte_total') | float(0) %}
            {% set rte_export_equivalent = (rte_totaal / 100) ** 0.5 * 100 %}
            {% if export_eff < 70 %}
              {{ rte_export_equivalent | round(1) }} %
            {% else %}
              {{ export_eff | round(1) }} %
            {% endif %}
          source_export_efficiency: >
            {% set export_eff = states('sensor.zendure_export_efficiency_24u') | float(0) %}
            {% if export_eff < 70 %}
              RTE total (√RTE × 100)
            {% else %}
              Export efficiency 24h average
            {% endif %}

      - name: "Zendure RTE Total"
        unique_id: zendure_rte_total
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:percent-box
        state: >
          {% set energy_import = states('sensor.zendure_energy_import') | float(0) %}
          {% set energy_export = states('sensor.zendure_energy_export') | float(0) %}
          {% if energy_import > 0 %}
            {% set percentage = ((energy_export / energy_import) * 100) | round(2) %}
            {% if 0 <= percentage <= 100 %}
              {{ percentage }}
            {% else %}
              0
            {% endif %}
          {% else %}
            0
          {% endif %}

rest:
  - resource_template: "http://{{ states('input_text.zendure_setting_ip_address') }}/properties/report"
    scan_interval: 1
    sensor:
      - name: "Zendure Productserie"
        unique_id: zendure_productserie
        value_template: "{{ value_json.product }}"
        icon: mdi:identifier

      - name: "Zendure Total Capacity"
        unique_id: zendure_total_capacity
        unit_of_measurement: "kWh"
        icon: mdi:flip-vertical
        value_template: >
          {% set mapping = {
            5: 2.88,
            70: 1.92,
            300: 1.92,
            350: 2.88,
            500: 2.40
          } %}
          {% set packs = value_json.packData %}
          {% if packs %}
            {% set ns = namespace(total=0) %}
            {% for pack in packs %}
              {% set type = pack.packType | int %}
              {% if type in mapping %}
                {% set ns.total = ns.total + mapping[type] %}
              {% endif %}
            {% endfor %}
            {{ ns.total | round(2) }}
          {% else %}
            0
          {% endif %}

      - name: "Zendure Inverter Max. Charge Power"
        value_template: "{{ value_json['properties']['chargeMaxLimit'] }}"
        unique_id: zendure_inverter_max_charge_power
        unit_of_measurement: "W"
        state_class: measurement
        device_class: power

      - name: "Zendure Inverter Max. Discharge Power"
        value_template: "{{ value_json['properties']['inverseMaxPower'] }}"
        unique_id: zendure_inverter_max_discharge_power
        unit_of_measurement: "W"
        state_class: measurement
        device_class: power

      - name: "Zendure SOC-limit Status"
        value_template: >
          {% set states = {0: "Normal Operation", 1: "Charging Limit Reached", 2: "Discharge Limit Reached"} %}
          {% set packState = value_json['properties']['socLimit'] | int %}
          {{ states.get(packState, "Onbekend") }}
        unique_id: zendure_soc_limit_status
        icon: >
         {% if this.state == 'Normal Operation' %}
          mdi:battery-medium
         {% elif this.state == 'Charging Limit Reached' %}
          mdi:battery-high
         {% elif this.state == 'Discharge Limit Reached' %}
          mdi:battery-low
         {% else %}
          mdi:battery-outline
         {% endif %}
          
      - name: "Zendure Battery Serienumbers"
        value_template: >
          {% set volgorde_raw = states('input_text.zendure_setting_battery_order') %}
          {% set packdata = value_json['packData'] %}
          {% set ns = namespace(sn_list=[]) %}
          {% if not packdata %}
            unknown
          {% elif volgorde_raw in ['unknown', 'unavailable', ''] %}
            {% for pack in packdata %}
              {% set ns.sn_list = ns.sn_list + [ pack['sn'] ] %}
            {% endfor %}
          {% else %}
            {% set volgorde = volgorde_raw.split(';') %}
            {% for v in volgorde %}
              {% set idx = (v | int) - 1 %}
              {% if idx >= 0 and idx < packdata | length %}
                {% set ns.sn_list = ns.sn_list + [ packdata[idx]['sn'] ] %}
              {% endif %}
            {% endfor %}
          {% endif %}
          {{ ns.sn_list | join('\n') }}
        unique_id: zendure_battery_serienumbers
        icon: mdi:identifier

      - name: "Zendure Battery 1 Electricity Level"
        value_template: >
          {% set volgorde_raw = states('input_text.zendure_setting_battery_order') %}
          {% set packdata = value_json['packData'] %}
          {% if not packdata %}
            unknown
          {% elif volgorde_raw in ['unknown', 'unavailable', ''] %}
            {{ packdata[0]['socLevel'] }}
          {% else %}
            {% set idx = (volgorde_raw.split(';')[0] | int) - 1 %}
            {{ packdata[idx]['socLevel'] if idx < packdata | length else 'unknown' }}
          {% endif %}
        unique_id: "zendure_battery_1_electricity_level"
        device_class: battery
        unit_of_measurement: "%"
