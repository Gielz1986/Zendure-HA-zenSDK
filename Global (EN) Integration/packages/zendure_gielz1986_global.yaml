        device_class: battery
        unit_of_measurement: "%"
        state_class: measurement
        unique_id: zendure_total_electricity_level

      - name: "Zendure Minimum Electricity Level"
        value_template: "{{ (value_json['properties']['minSoc'] | int / 10) | int }}"
        device_class: battery
        unit_of_measurement: "%"
        state_class: measurement
        unique_id: zendure_minimum_electricity_level
        icon: mdi:battery-high

      - name: "Zendure Maximum Electricity Level"
        value_template: "{{ (value_json['properties']['socSet'] | int / 10) | int }}"
        device_class: battery
        unit_of_measurement: "%"
        state_class: measurement
        unique_id: zendure_maximum_electricity_level
        icon: mdi:battery-high

      - name: "Zendure Charging  Mode"
        value_template: >
          {% set ac_mode = value_json['properties']['acMode'] | int %}
          {% set input_power = value_json['properties']['gridInputPower'] | int %}
          {% set output_power = value_json['properties']['outputHomePower'] | int %}

          {% if ac_mode == 1 and input_power > 0 %}
           Charging
          {% elif ac_mode == 2 and output_power > 0 %}
           Discharging
          {% else %}
           Standby
          {% endif %}
        unique_id: zendure_charging_mode
        icon: >
          {% if this.state == 'Charging' %}
           mdi:battery-plus-variant
          {% elif this.state == 'Discharing' %}
           mdi:battery-minus-variant
          {% else %}
           mdi:battery-outline
          {% endif %}

      - name: "Zendure Error"
        value_template: >
          {% set states = {0: "No Notifications", 1: "Check Zendure APP"} %}
          {% set packState = value_json['properties']['is_error'] | int %}
          {{ states.get(packState, "Onbekend") }}
        unique_id: zendure_error
        icon: mdi:battery-alert

      - name: "Zendure Calibrating"
        value_template: >
          {% set states = {0: "No", 1: "Yes"} %}
          {% set packState = value_json['properties']['socStatus'] | int %}
          {{ states.get(packState, "Onbekend") }}
        unique_id: zendure_calibrating
        icon: mdi:battery-heart-variant

      - name: "Zendure Set Discharge Power"
        value_template: "{{ value_json['properties']['outputLimit'] }}"
        unique_id: zendure_set_discharge_power
        unit_of_measurement: "W"
        state_class: measurement
        device_class: power

      - name: "Zendure Set Charge Power"
        value_template: "{{ value_json['properties']['inputLimit'] }}"
        unique_id: zendure_set_charge_power
        unit_of_measurement: "W"
        state_class: measurement
